<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6a8a;--gold:#c9a84c;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 0%,rgba(124,106,255,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(255,106,138,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
header{position:relative;z-index:1;padding:40px 18px 24px;text-align:center;border-bottom:1px solid var(--border);}
.avatar-wrap{width:80px;height:80px;margin:0 auto 14px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;box-shadow:0 0 28px rgba(124,106,255,.35);}
.avatar-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.header-name{font-family:'Shippori Mincho',serif;font-size:40px;font-weight:800;letter-spacing:.1em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.header-sub{font-size:10px;letter-spacing:.35em;color:var(--muted);margin-bottom:12px;text-transform:uppercase;}
.header-desc{font-size:12.5px;color:var(--muted);line-height:1.85;margin-bottom:16px;white-space:pre-wrap;word-break:break-all;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px;}
.role-item{background:var(--surface);border:1px solid var(--border);padding:9px 11px;font-size:11px;line-height:1.55;text-align:left;}
.role-name{color:var(--accent);font-weight:700;display:block;margin-bottom:1px;}
.role-desc{color:var(--muted);font-size:10px;}
.header-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.hbtn{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 6px;font-size:12px;letter-spacing:.06em;text-decoration:none;border:1px solid var(--border);color:var(--text);background:var(--surface);border-radius:2px;white-space:nowrap;}
.hbtn.contact{border-color:var(--accent);color:var(--accent);}
.hbtn.booth{border-color:var(--accent2);color:var(--accent2);}
.hbtn:active{opacity:.6;}
.stats-row{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat-box{background:var(--surface);padding:14px 8px;text-align:center;}
.stat-n{font-family:'Shippori Mincho',serif;font-size:26px;color:var(--accent);line-height:1;display:block;}
.stat-l{font-size:9px;color:var(--muted);letter-spacing:.2em;margin-top:3px;display:block;}
main{position:relative;z-index:1;padding:0 14px 60px;}
.year-section{margin-top:30px;}
.year-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none;padding:6px 0;}
.year-num{font-family:'Shippori Mincho',serif;font-size:30px;font-weight:800;color:var(--accent);line-height:1;}
.year-count{font-size:10px;color:var(--muted);letter-spacing:.15em;}
.year-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.year-toggle{color:var(--muted);font-size:12px;transition:transform .3s;}
.year-section.collapsed .year-toggle{transform:rotate(-90deg);}
.year-section.collapsed .year-body{display:none;}
.live-card{display:grid;grid-template-columns:64px 1fr;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;position:relative;opacity:0;transform:translateY(10px);transition:opacity .35s,transform .35s;border-radius:2px;}
.live-card.visible{opacity:1;transform:none;}
.live-card.upcoming{border-color:rgba(96,165,250,.3);}
.live-card.has-link{cursor:pointer;}
.live-card.has-link:active{opacity:.7;}
.card-thumb-wrap{width:64px;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;min-height:68px;}
.card-thumb{width:64px;height:100%;min-height:68px;object-fit:cover;display:block;filter:saturate(.7);}
.card-thumb-ph{font-family:'Shippori Mincho',serif;font-size:18px;color:rgba(124,106,255,.3);}
.card-body{padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-date{font-size:11px;color:var(--gold);letter-spacing:.06em;white-space:nowrap;}
.role-badge{font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:.06em;font-weight:700;white-space:nowrap;}
.role-主催{background:rgba(124,106,255,.2);color:#a89fff;border:1px solid rgba(124,106,255,.3);}
.role-運営{background:rgba(74,222,128,.15);color:#86efac;border:1px solid rgba(74,222,128,.3);}
.role-運営補佐{background:rgba(251,146,60,.15);color:#fdba74;border:1px solid rgba(251,146,60,.3);}
.role-運営スタッフ{background:rgba(96,165,250,.15);color:#93c5fd;border:1px solid rgba(96,165,250,.3);}
.upcoming-badge{font-size:9px;padding:2px 6px;background:rgba(96,165,250,.15);color:#93c5fd;border:1px solid rgba(96,165,250,.4);letter-spacing:.1em;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-title{font-size:13px;font-weight:500;color:var(--text);letter-spacing:.04em;line-height:1.35;word-break:break-all;}
.card-meta{font-size:10px;color:var(--muted);}
.card-format{font-size:10px;color:rgba(124,106,255,.65);}
.section-label{display:flex;align-items:center;gap:10px;margin:32px 0 12px;}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.section-label::after{background:linear-gradient(to left,var(--border),transparent);}
.section-label span{font-size:10px;letter-spacing:.3em;color:var(--muted);white-space:nowrap;}
.booth-section{background:var(--surface);border:1px solid var(--border);padding:18px;border-radius:4px;position:relative;overflow:hidden;}
.booth-section::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--accent2),var(--accent));}
.booth-title{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:800;color:var(--accent2);margin-bottom:5px;}
.booth-desc{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
.booth-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.booth-item{background:var(--surface2);border:1px solid var(--border);padding:12px 10px;text-decoration:none;color:var(--text);display:block;border-radius:4px;}
.booth-item:active{opacity:.65;}
.booth-icon{font-size:22px;margin-bottom:5px;}
.booth-name{font-size:12px;font-weight:500;margin-bottom:2px;}
.booth-note{font-size:10px;color:var(--muted);}
footer{position:relative;z-index:1;text-align:center;padding:24px 20px;border-top:1px solid var(--border);margin-top:28px;}
footer p{font-size:10px;color:var(--muted);letter-spacing:.12em;}
footer a{color:var(--accent);text-decoration:none;}
</style>
</head>

    const upCount=lives.filter(l=>l.upcoming).length;
    const sec=document.createElement('div');sec.className='year-section';sec.dataset.year=year;
    sec.innerHTML=`<div class="year-header" onclick="this.parentNode.classList.toggle('collapsed')"><span class="year-num">${year}</span><span class="year-count">${lives.length-upCount}本${upCount>0?' + '+upCount+'予定':''}</span><div class="year-line"></div><span class="year-toggle">▾</span></div><div class="year-body"></div>`;
    main.appendChild(sec);
    const body=sec.querySelector('.year-body');
    lives.forEach(live=>{
      const div=document.createElement('div');
      div.className='live-card'+(live.upcoming?' upcoming':'')+(live.link?' has-link':'');
      div.innerHTML=`<div class="card-thumb-wrap">${live.thumb?`<img class="card-thumb" src="${esc(live.thumb)}" alt="${esc(live.title)}" onerror="this.parentNode.innerHTML='<div class=card-thumb-ph>${live.role==='主催'?'主':'運'}</div>'">`:`<div class="card-thumb-ph">${live.role==='主催'?'主':'運'}</div>`}</div><div class="card-body"><div class="card-top"><span class="card-date">${esc(live.date)}</span><span class="role-badge role-${live.role}">${live.role}</span>${live.upcoming?'<span class="upcoming-badge">UPCOMING</span>':''}</div><div class="card-title">${esc(live.title)}</div>${live.organizer?`<div class="card-meta">${esc(live.organizer)}</div>`:''}${live.format?`<div class="card-format">${esc(live.format)}</div>`:''}</div>`;
      if(live.link) div.addEventListener('click',()=>window.open(live.link,'_blank'));
      body.appendChild(div);
    });
  });
  countUp('sTotal',total);countUp('sOwn',own);countUp('sOps',ops);
  setTimeout(()=>document.querySelectorAll('.live-card').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*22)),50);
}

function countUp(id,target){
  const el=document.getElementById(id);if(!el)return;
  let n=0;const step=Math.max(1,Math.ceil(target/30));
  const t=setInterval(()=>{n=Math.min(n+step,target);el.textContent=n;if(n>=target)clearInterval(t);},20);
}

renderAll();
</script>
</body>
</html>
