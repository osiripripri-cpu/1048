<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6a8a;--gold:#c9a84c;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:relative;z-index:1;padding:30px 18px 20px;text-align:center;border-bottom:1px solid var(--border);}
.header-name{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:800;color:var(--accent);margin-bottom:10px;}
.admin-toolbar{display:flex;justify-content:center;gap:10px;margin-top:15px;flex-wrap:wrap;}
.btn{padding:10px 16px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-width:140px;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.success{background:var(--accent2);border-color:var(--accent2);color:#fff;}
main{padding:20px 14px 100px;max-width:800px;margin:0 auto;}
.section-title{font-size:14px;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.live-list{display:grid;gap:10px;}
.live-item{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:6px;display:grid;grid-template-columns:50px 1fr 80px;gap:12px;align-items:center;}
.live-thumb-preview{width:50px;height:50px;background:var(--surface2);border-radius:4px;object-fit:cover;}
.live-info{overflow:hidden;}
.live-info-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.live-info-sub{font-size:10px;color:var(--muted);}

/* モーダル */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:500px;padding:24px;border-radius:8px;max-height:90vh;overflow-y:auto;}
.modal-h2{font-size:18px;margin-bottom:20px;color:var(--accent);}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-family:inherit;font-size:13px;}
.image-upload-area{border:2px dashed var(--border);padding:15px;text-align:center;border-radius:4px;margin-bottom:10px;cursor:pointer;}
.image-upload-area:hover{border-color:var(--accent);}
.image-preview-large{width:100%;height:150px;object-fit:contain;background:#000;margin-top:10px;border-radius:4px;display:none;}
.image-preview-large.active{display:block;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btns button{flex:1;padding:12px;}
#exportText{width:100%;height:300px;background:#000;color:#0f0;font-family:monospace;font-size:11px;padding:10px;margin-bottom:10px;}
</style>
</head>
<body>

<header>
  <div class="header-name">1048 Web管理画面</div>
  <div class="admin-toolbar">
    <button class="btn" onclick="openProfileModal()">👤 プロフィール・ツール</button>
    <button class="btn primary" onclick="openLiveModal()">➕ ライブ実績追加</button>
    <button class="btn success" id="btnExport">🚀 公開用コード書き出し</button>
  </div>
</header>

<main>
  <div id="liveListContainer"></div>
</main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h2 class="modal-h2">ライブ実績の登録</h2>
    <div class="form-group">
      <label>サムネイル画像</label>
      <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
        <span style="font-size:12px;">📁 画像を選択、またはここにドラッグ</span>
        <input type="file" id="fileInput" hidden accept="image/*">
        <img id="imgPreview" class="image-preview-large">
      </div>
      <input type="text" id="lThumb" placeholder="URLが自動入力されます" style="font-size:10px; opacity:0.6;">
    </div>
    <div class="form-group"><label>開催年</label><select id="lYear"><option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option></select></div>
    <div class="form-group"><label>日付 (例: 10/17)</label><input type="text" id="lDate"></div>
    <div class="form-group"><label>タイトル</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式 (例: 2部制インスト)</label><input type="text" id="lFormat"></div>
    <div class="form-group"><label>詳細リンク (Twitter等)</label><input type="text" id="lLink"></div>
    <div class="form-group" style="display:flex; align-items:center; gap:10px;"><input type="checkbox" id="lUpcoming" style="width:auto;"><label style="margin:0;">今後開催（UPCOMING）</label></div>
    
    <div class="modal-btns">
      <button class="btn" onclick="closeLiveModal()">キャンセル</button>
      <button class="btn primary" id="btnSaveLive">保存する</button>
    </div>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-content">
    <h2 class="modal-h2">基本情報 & ツール設定</h2>
    <div class="form-group"><label>名前</label><input type="text" id="hName"></div>
    <div class="form-group"><label>肩書き</label><input type="text" id="hSub"></div>
    <div class="form-group"><label>自己紹介</label><textarea id="hDesc"></textarea></div>
    <div class="form-group"><label>Twitter(X) URL</label><input type="text" id="hTwitter"></div>
    <h2 class="modal-h2" style="margin-top:30px;">ツール販売設定 (4枠)</h2>
    <div id="boothInputs"></div>
    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('profileModal').classList.remove('open')">キャンセル</button>
      <button class="btn primary" id="btnSaveProfile">保存して反映</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content" style="max-width:700px;">
    <h2 class="modal-h2">公開用コード</h2>
    <p style="font-size:11px; color:var(--muted); margin-bottom:10px;">以下のコードを全選択してコピーし、GitHubの index.html を全消しして貼り付けてください。</p>
    <textarea id="exportText" readonly></textarea>
    <button class="btn primary" id="copyBtn" style="width:100%;">📋 コピーする</button>
  </div>
</div>

<script>
let SITE_DATA = {
  profile: { name: "1048", sub: "Live Event Producer", desc: "", contact: "toshiya1227@live.jp", booth: "https://1048bp.booth.pm/", twitter: "https://x.com/info_inishie", role1: "準備〜当日終了まで全て", role2: "ライブハウス予約/予算管理/当日進行", role3: "準備サポート・当日進行全般", role4: "当日スタッフリーダー",
    tools: [
      {icon:"💰", name:"StallKit", note:"物販・ガチャ・くじPOS", url:"https://1048bp.booth.pm/"},
      {icon:"📋", name:"運営ツール", note:"精算・レポートPDF", url:"https://1048bp.booth.pm/"},
      {icon:"🎵", name:"LiveMemory", note:"ファン向けライブ記録", url:"https://1048bp.booth.pm/"},
      {icon:"📊", name:"ガントチャート", note:"制作進行タスク管理", url:"https://1048bp.booth.pm/"}
    ]
  },
  lives: {}
};

// ストレージから復元
const saved = localStorage.getItem('1048_admin_data');
if(saved) SITE_DATA = JSON.parse(saved);

function renderLiveList() {
  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);
  years.forEach(year => {
    container.innerHTML += `<div class="section-title">${year}年</div><div class="live-list" id="list-${year}"></div>`;
    const list = document.getElementById(`list-${year}`);
    SITE_DATA.lives[year].forEach((live, index) => {
      list.innerHTML += `
        <div class="live-item">
          <img src="${live.thumb || ''}" class="live-thumb-preview">
          <div class="live-info">
            <div class="live-info-title">${live.title}</div>
            <div class="live-info-sub">${live.date} / ${live.role}</div>
          </div>
          <button class="btn" onclick="deleteLive('${year}', ${index})" style="min-width:auto; padding:5px; color:var(--accent2);">削除</button>
        </div>
      `;
    });
  });
}

// 画像をBase64に変換する処理
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const base64 = event.target.result;
    document.getElementById('lThumb').value = base64; // テキスト欄に代入
    const img = document.getElementById('imgPreview');
    img.src = base64;
    img.classList.add('active');
  };
  reader.readAsDataURL(file);
});

function openLiveModal() {
  document.getElementById('imgPreview').classList.remove('active');
  document.getElementById('lThumb').value = '';
  document.getElementById('lTitle').value = '';
  document.getElementById('lDate').value = '';
  document.getElementById('liveModal').classList.add('open');
}

function closeLiveModal() { document.getElementById('liveModal').classList.remove('open'); }

document.getElementById('btnSaveLive').addEventListener('click', () => {
  const year = document.getElementById('lYear').value;
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  
  const newLive = {
    date: document.getElementById('lDate').value,
    role: document.getElementById('lRole').value,
    title: document.getElementById('lTitle').value,
    organizer: "", 
    format: document.getElementById('lFormat').value,
    link: document.getElementById('lLink').value,
    thumb: document.getElementById('lThumb').value,
    upcoming: document.getElementById('lUpcoming').checked
  };

  SITE_DATA.lives[year].unshift(newLive);
  saveAll();
  renderLiveList();
  closeLiveModal();
});

function deleteLive(year, index) {
  if(confirm('削除してよろしいですか？')) {
    SITE_DATA.lives[year].splice(index, 1);
    saveAll();
    renderLiveList();
  }
}

function saveAll() { localStorage.setItem('1048_admin_data', JSON.stringify(SITE_DATA)); }

// プロフィール編集・ツール編集 (前回のロジック)
function openProfileModal() {
  const p = SITE_DATA.profile;
  document.getElementById('hName').value = p.name;
  document.getElementById('hSub').value = p.sub;
  document.getElementById('hDesc').value = p.desc;
  document.getElementById('hTwitter').value = p.twitter;
  const container = document.getElementById('boothInputs');
  container.innerHTML = '';
  p.tools.forEach((t, i) => {
    container.innerHTML += `<div style="background:var(--surface2); padding:10px; margin-bottom:10px; border-radius:4px; border:1px solid var(--border);">
      <div style="display:grid; grid-template-columns:50px 1fr 1fr; gap:5px; margin-bottom:5px;">
        <input type="text" id="tIcon${i}" value="${t.icon}">
        <input type="text" id="tName${i}" value="${t.name}">
        <input type="text" id="tNote${i}" value="${t.note}">
      </div>
      <input type="text" id="tUrl${i}" value="${t.url}">
    </div>`;
  });
  document.getElementById('profileModal').classList.add('open');
}

document.getElementById('btnSaveProfile').addEventListener('click', () => {
  const p = SITE_DATA.profile;
  p.name = document.getElementById('hName').value;
  p.sub = document.getElementById('hSub').value;
  p.desc = document.getElementById('hDesc').value;
  p.twitter = document.getElementById('hTwitter').value;
  p.tools = [];
  for(let i=0; i<4; i++) {
    p.tools.push({ icon: document.getElementById(`tIcon${i}`).value, name: document.getElementById(`tName${i}`).value, note: document.getElementById(`tNote${i}`).value, url: document.getElementById(`tUrl${i}`).value });
  }
  saveAll();
  document.getElementById('profileModal').classList.remove('open');
});

document.getElementById('btnExport').addEventListener('click', () => {
  document.getElementById('exportText').value = `const SITE_DATA = ${JSON.stringify(SITE_DATA)};`;
  document.getElementById('exportModal').classList.add('open');
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const ta = document.getElementById('exportText');
  ta.select();
  document.execCommand('copy');
  alert('コピーしました！GitHubの index.html に貼り付けてください。');
});

renderLiveList();
</script>
</body>
</html>
