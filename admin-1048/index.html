<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1048 MASTER ADMIN v8</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
<style>
/* lit.link 完全再現スタイル */
:root { --bg:#030305; --accent:#a682ff; --blue:#00a2ff; --border:#252535; --text:#e0e0ed; --sub:#7a7a8c; }
body { background:#000; color:#fff; font-family:'Noto Sans JP', sans-serif; margin:0; }
.admin-bar { background:#1a1a2e; padding:15px; display:flex; justify-content:space-between; position:sticky; top:0; z-index:9999; border-bottom:2px solid var(--accent); }
.btn-p { background:var(--accent); color:#fff; border:none; padding:10px 18px; border-radius:5px; font-weight:bold; cursor:pointer; }
.btn-s { background:#22c55e; color:#fff; border:none; padding:10px 18px; border-radius:5px; font-weight:bold; cursor:pointer; }
.preview { background:var(--bg); max-width:450px; margin:0 auto; padding:60px 20px; border-left:1px solid #333; border-right:1px solid #333; min-height:100vh; }
.p-img { width:120px; height:120px; border-radius:50%; border:2px solid var(--accent); display:block; margin:0 auto 20px; object-fit:cover; cursor:pointer; }
.p-name { font-family:'Shippori Mincho'; font-size:34px; text-align:center; background:linear-gradient(to bottom, #fff, var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0; }
.p-desc { font-size:13px; color:var(--sub); text-align:center; line-height:1.8; margin:20px 0 40px; white-space:pre-wrap; }
.r-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:40px; }
.r-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:15px; border-radius:8px; cursor:pointer; }
.r-t { font-weight:bold; font-size:13px; margin-bottom:5px; }
.r-d { font-size:11px; color:var(--sub); }
.l-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:40px; }
.l-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:12px 5px; font-size:11px; color:#e0e0ed; border-radius:6px; text-align:center; cursor:pointer; }
.stats { display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid var(--border); padding:25px 0; }
.s-item { text-align:center; border-right:1px solid var(--border); }
.s-item:last-child { border-right:none; }
.s-n { font-family:'Shippori Mincho'; font-size:28px; color:var(--accent); }
.s-l { font-size:10px; color:var(--sub); }
.year-hd { font-family:'Shippori Mincho'; font-size:20px; color:var(--accent); margin:40px 0 15px; border-bottom:1px solid var(--border); padding-bottom:5px; }
.live-card { background:#11111a; border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px; display:flex; align-items:center; gap:15px; position:relative; }
.live-img { width:60px; height:60px; border-radius:8px; object-fit:cover; }
.live-t { font-size:14px; font-weight:bold; margin-bottom:4px; }
.tag { font-size:10px; padding:2px 8px; border-radius:4px; color:#fff; font-weight:bold; }
.date { font-size:11px; color:var(--sub); margin-left:8px; }
.neon { color:var(--blue); text-shadow:0 0 8px var(--blue); font-weight:bold; font-family:serif; margin-left:8px; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; display:none; align-items:center; justify-content:center; padding:20px; }
.modal.open { display:flex; }
.m-inner { background:#13131f; width:100%; max-width:400px; padding:25px; border-radius:20px; border:1px solid var(--accent); max-height:85vh; overflow-y:auto; }
.field { margin-bottom:15px; }
.field label { display:block; font-size:11px; color:var(--accent); margin-bottom:5px; }
.field input, .field textarea, .field select { width:100%; box-sizing:border-box; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:8px; }
</style>
</head>
<body>

<div class="admin-bar">
    <div style="font-weight:bold">1048 MASTER <small>v8-fresh</small></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-p" onclick="openLiveModal()">＋ ライブ追加</button>
        <button class="btn-s" onclick="exportHTML()">🚀 公開コードコピー</button>
    </div>
</div>

<div class="preview">
    <div onclick="openProfileModal()">
        <img id="p-icon" class="p-img" src="">
        <h1 id="p-name" class="p-name">1048</h1>
        <div id="p-desc" class="p-desc"></div>
    </div>
    <div class="r-grid" id="r-grid"></div>
    <div class="l-row">
        <div class="l-btn" onclick="openLinkModal('mail')">📩 問い合わせ</div>
        <div class="l-btn" onclick="openLinkModal('booth')">🛒 BOOTH</div>
        <div class="l-btn" onclick="openLinkModal('twitter')">𝕏 Twitter</div>
    </div>
    <div class="stats">
        <div class="s-item"><div id="s-total" class="s-n">0</div><div class="s-l">総制作本数</div></div>
        <div class="s-item"><div id="s-org" class="s-n">0</div><div class="s-l">主催</div></div>
        <div class="s-item"><div id="s-man" class="s-n">0</div><div class="s-l">運営</div></div>
    </div>
    <div id="live-list"></div>
</div>

<div class="modal" id="modal"><div class="m-inner" id="m-content"></div></div>

<script>
let DB = {
    profile: { name: "1048", desc: "主催・運営のご依頼はDMまで", icon: "" },
    links: { mail: "#", booth: "#", twitter: "#" },
    roles: [
        {t: "【主催】", d: "準備〜当日終了まで全て", c: "#a682ff"},
        {t: "【運営】", d: "ライブハウス予約/予算管理/当日進行", c: "#00a2ff"},
        {t: "【運営補佐】", d: "準備サポート・当日進行全般", c: "#22c55e"},
        {t: "【スタッフ】", d: "当日スタッフリーダー", c: "#f59e0b"}
    ],
    lives: []
};

const saved = localStorage.getItem('1048_db_v8');
if(saved) DB = JSON.parse(saved);

const COLORS = {"主催": "#a682ff", "運営": "#00a2ff", "運営補佐": "#22c55e", "スタッフ": "#f59e0b"};

// 画像圧縮・リサイズ
async function processImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 400;
                let w = img.width, h = img.height;
                if (w > MAX) { h = h * (MAX / w); w = MAX; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
        };
    });
}

function render() {
    document.getElementById('p-icon').src = DB.profile.icon || 'https://via.placeholder.com/150';
    document.getElementById('p-name').innerText = DB.profile.name;
    document.getElementById('p-desc').innerText = DB.profile.desc;
    document.getElementById('r-grid').innerHTML = DB.roles.map((r, i) => `
        <div class="r-box" onclick="openRoleModal(${i})">
            <div class="r-t" style="color:${r.c}">${r.t}</div>
            <div class="r-d">${r.d}</div>
        </div>`).join('');

    const list = document.getElementById('live-list');
    list.innerHTML = '';
    let cOrg = 0, cMan = 0;
    const sorted = [...DB.lives].sort((a,b) => new Date(b.date) - new Date(a.date));
    let lastY = null;
    const now = new Date();

    sorted.forEach(l => {
        if(l.role === "主催") cOrg++;
        if(l.role === "運営" || l.role === "運営補佐") cMan++;
        const y = new Date(l.date).getFullYear();
        if(y !== lastY) { list.innerHTML += `<div class="year-hd">${y}</div>`; lastY = y; }
        const isF = new Date(l.date) > now;
        list.innerHTML += `
            <div class="live-card">
                <img src="${l.img}" class="live-img" onerror="this.src='https://via.placeholder.com/60'">
                <div style="flex:1">
                    <div class="live-t">${l.title}${isF ? '<span class="neon">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗...</span>' : ''}</div>
                    <span class="tag" style="background:${COLORS[l.role]}">${l.role}</span>
                    <span class="date">${l.date.replace(/-/g,'/')}</span>
                </div>
                <div onclick="openLiveModal(${DB.lives.indexOf(l)})" style="color:var(--accent); cursor:pointer; padding:5px;">✎</div>
            </div>`;
    });
    document.getElementById('s-total').innerText = DB.lives.length;
    document.getElementById('s-org').innerText = cOrg;
    document.getElementById('s-man').innerText = cMan;
    localStorage.setItem('1048_db_v8', JSON.stringify(DB));
}

function showM(h) { document.getElementById('m-content').innerHTML = h; document.getElementById('modal').classList.add('open'); }
function closeM() { document.getElementById('modal').classList.remove('open'); }

// プロフィール
function openProfileModal() {
    showM(`<h3>プロフィール編集</h3>
        <div class="field"><label>アイコン</label><input type="file" accept="image/*" onchange="upImg(this,'p')"></div>
        <div class="field"><label>名前</label><input id="f-name" value="${DB.profile.name}"></div>
        <div class="field"><label>説明</label><textarea id="f-desc" rows="4">${DB.profile.desc}</textarea></div>
        <button class="btn-p" style="width:100%" onclick="saveP()">保存</button>`);
}
async function upImg(input, mode) {
    const data = await processImage(input.files[0]);
    if(mode==='p') DB.profile.icon = data;
    else document.getElementById('tmp-img').src = data;
}
function saveP() {
    DB.profile.name = document.getElementById('f-name').value;
    DB.profile.desc = document.getElementById('f-desc').value;
    render(); closeM();
}

// 役割
function openRoleModal(i) {
    showM(`<h3>役割編集</h3>
        <div class="field"><label>見出し</label><input id="f-rt" value="${DB.roles[i].t}"></div>
        <div class="field"><label>説明</label><input id="f-rd" value="${DB.roles[i].d}"></div>
        <div class="field"><label>色</label><input type="color" id="f-rc" value="${DB.roles[i].c}"></div>
        <button class="btn-p" style="width:100%" onclick="saveR(${i})">保存</button>`);
}
function saveR(i) {
    DB.roles[i].t = document.getElementById('f-rt').value;
    DB.roles[i].d = document.getElementById('f-rd').value;
    DB.roles[i].c = document.getElementById('f-rc').value;
    render(); closeM();
}

// ライブ
function openLiveModal(idx = -1) {
    const l = idx > -1 ? DB.lives[idx] : {title:"", date:"", role:"主催", img:"", link:""};
    showM(`<h3>ライブ実績</h3>
        <div class="field"><label>フライヤー</label><img id="tmp-img" src="${l.img}" style="width:60px;height:60px;object-fit:cover;display:block;margin-bottom:5px;"><input type="file" onchange="upImg(this,'l')"></div>
        <div class="field"><label>タイトル</label><input id="f-lt" value="${l.title}"></div>
        <div class="field"><label>日付</label><input type="date" id="f-ld" value="${l.date}"></div>
        <div class="field"><label>役割</label><select id="f-lr">
            <option ${l.role==='主催'?'selected':''}>主催</option><option ${l.role==='運営'?'selected':''}>運営</option><option ${l.role==='運営補佐'?'selected':''}>運営補佐</option><option ${l.role==='スタッフ'?'selected':''}>スタッフ</option>
        </select></div>
        <div class="field"><label>リンク</label><input id="f-ll" value="${l.link}"></div>
        <button class="btn-p" style="width:100%" onclick="saveL(${idx})">保存</button>
        ${idx > -1 ? `<button onclick="delL(${idx})" style="width:100%;background:none;color:red;border:none;margin-top:10px">削除</button>` : ''}`);
}
function saveL(idx) {
    const data = { title:document.getElementById('f-lt').value, date:document.getElementById('f-ld').value, role:document.getElementById('f-lr').value, link:document.getElementById('f-ll').value, img:document.getElementById('tmp-img').src };
    if(idx > -1) DB.lives[idx] = data; else DB.lives.push(data);
    render(); closeM();
}
function delL(i) { if(confirm("削除しますか？")){ DB.lives.splice(i,1); render(); closeM(); } }

// リンク
function openLinkModal(k) {
    showM(`<h3>リンク編集</h3><div class="field"><label>URL</label><input id="f-link" value="${DB.links[k]}"></div><button class="btn-p" style="width:100%" onclick="saveLink('${k}')">保存</button>`);
}
function saveLink(k) { DB.links[k] = document.getElementById('f-link').value; render(); closeM(); }

// 出力
function exportHTML() {
    const sorted = [...DB.lives].sort((a,b) => new Date(b.date) - new Date(a.date));
    let lastY = null; let liveH = ''; const now = new Date(); let cO=0, cM=0;
    sorted.forEach(l => {
        if(l.role==="主催") cO++; if(l.role==="運営"||l.role==="運営補佐") cM++;
        const y = new Date(l.date).getFullYear();
        if(y !== lastY) { liveH += `\n        <div class="year-hd">${y}</div>`; lastY = y; }
        const isF = new Date(l.date) > now;
        liveH += `
        <a href="${l.link || '#'}" target="_blank" class="live-card" style="text-decoration:none;color:inherit;">
            <img src="${l.img}" class="live-img" onerror="this.src='https://via.placeholder.com/60'">
            <div style="flex:1">
                <div class="live-t">${l.title}${isF ? '<span class="neon">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗...</span>' : ''}</div>
                <span class="tag" style="background:${COLORS[l.role]}">${l.role}</span>
                <span class="date">${l.date.replace(/-/g,'/')}</span>
            </div>
        </a>`;
    });

    const out = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${DB.profile.name} ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#030305; --accent:#a682ff; --blue:#00a2ff; --border:#252535; --sub:#7a7a8c; }
body { background:var(--bg); color:#e0e0ed; font-family:'Noto Sans JP',sans-serif; margin:0; display:flex; justify-content:center; }
.w { width:100%; max-width:450px; padding:60px 20px 100px; }
.p-i { width:120px; height:120px; border-radius:50%; border:2px solid var(--accent); object-fit:cover; display:block; margin:0 auto 20px; }
.p-n { font-family:'Shippori Mincho'; font-size:34px; text-align:center; background:linear-gradient(to bottom, #fff, var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0; }
.p-d { font-size:13px; color:var(--sub); text-align:center; line-height:1.8; margin:20px 0 40px; white-space:pre-wrap; }
.r-g { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:40px; }
.r-b { background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:15px; border-radius:8px; }
.r-t { font-weight:bold; font-size:13px; margin-bottom:5px; }
.r-d { font-size:11px; color:var(--sub); }
.l-r { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:40px; }
.l-b { background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:12px 5px; border-radius:6px; text-align:center; font-size:11px; text-decoration:none; color:#e0e0ed; }
.st { display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid var(--border); padding:25px 0; }
.s-i { text-align:center; border-right:1px solid var(--border); }
.s-i:last-child { border-right:none; }
.s-n { font-family:'Shippori Mincho'; font-size:28px; color:var(--accent); }
.s-l { font-size:10px; color:var(--sub); }
.year-hd { font-family:'Shippori Mincho'; font-size:20px; color:var(--accent); margin:40px 0 15px; border-bottom:1px solid var(--border); padding-bottom:5px; }
.live-card { background:#11111a; border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px; display:flex; align-items:center; gap:15px; }
.live-img { width:60px; height:60px; border-radius:8px; object-fit:cover; }
.live-t { font-size:14px; font-weight:bold; margin-bottom:4px; }
.tag { font-size:10px; padding:2px 8px; border-radius:4px; color:#fff; font-weight:bold; }
.date { font-size:11px; color:var(--sub); margin-left:8px; }
.neon { color:var(--blue); text-shadow:0 0 8px var(--blue); font-weight:bold; font-family:serif; margin-left:8px; }
</style>
</head>
<body>
<div class="w">
    <img src="${DB.profile.icon}" class="p-i">
    <h1 class="p-n">${DB.profile.name}</h1>
    <p class="p-d">${DB.profile.desc}</p>
    <div class="r-g">
        ${DB.roles.map(r=>`<div class="r-b"><div class="r-t" style="color:${r.c}">${r.t}</div><div class="r-d">${r.d}</div></div>`).join('')}
    </div>
    <div class="l-r">
        <a href="${DB.links.mail}" class="l-b">📩 問い合わせ</a>
        <a href="${DB.links.booth}" class="l-b">🛒 BOOTH</a>
        <a href="${DB.links.twitter}" class="l-b">𝕏 Twitter</a>
    </div>
    <div class="st">
        <div class="s-i"><div class="s-n">${DB.lives.length}</div><div class="s-l">総制作本数</div></div>
        <div class="s-i"><div class="s-n">${cO}</div><div class="s-l">主催</div></div>
        <div class="s-i"><div class="s-n">${cM}</div><div class="s-l">運営</div></div>
    </div>${liveH}
</div>
</body>
</html>`;

    const area = document.createElement('textarea');
    area.value = out; document.body.appendChild(area); area.select();
    document.execCommand('copy'); document.body.removeChild(area);
    alert("整形された公開用コードをコピーしました！");
}

render();
</script>
</body>
</html>
