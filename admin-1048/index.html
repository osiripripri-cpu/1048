<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 LIVE ADMIN MASTER</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent-blue:#4db8ff;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;padding-bottom:100px;overscroll-behavior-y:none;}
header{position:sticky;top:0;z-index:10;padding:15px;text-align:center;border-bottom:1px solid var(--border);background:rgba(13,13,26,0.9);backdrop-filter:blur(10px);}
.admin-toolbar{display:flex;justify-content:center;gap:10px;margin-top:10px;}
.btn{padding:12px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.success{background:#22c55e;border-color:#22c55e;color:#fff;}
main{padding:10px 15px;max-width:600px;margin:0 auto;}
.section-title{font-size:13px;color:var(--muted);margin:30px 0 12px;display:flex;align-items:center;gap:10px;font-weight:700;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ライブ項目 - タップしやすく改善 */
.live-item{background:var(--surface);border:1px solid var(--border);padding:15px;border-radius:14px;display:grid;grid-template-columns:65px 1fr 30px;gap:15px;align-items:center;margin-bottom:12px;cursor:pointer;position:relative;}
.live-item:active{background:var(--surface2);opacity:0.8;}
.live-thumb-preview{width:65px;height:65px;background:#000;border-radius:8px;object-fit:cover;pointer-events:none;}
.live-info{pointer-events:none;min-width:0;}
.live-info-title{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.live-info-sub{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px;align-items:center;}

/* Coming Soon 青字設定 */
.tag-coming{color:var(--accent-blue);font-family:serif;font-weight:bold;margin-left:5px;font-size:12px;text-shadow: 0 0 5px rgba(77,184,255,0.3);}

/* モーダル */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(10px);}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:450px;padding:25px;border-radius:24px;max-height:90vh;overflow-y:auto;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;font-size:16px;outline:none;}
.img-box{border:2px dashed var(--border);padding:20px;text-align:center;border-radius:14px;cursor:pointer;margin-bottom:10px;background:var(--surface2);}
#imgPreview{width:100%;max-height:180px;object-fit:contain;margin-top:10px;display:none;border-radius:8px;}
#imgPreview.active{display:block;}
</style>
</head>
<body>

<header>
  <div style="font-family:'Shippori Mincho';font-size:18px;font-weight:800;color:var(--accent);">1048 LIVE ADMIN MASTER</div>
  <div class="admin-toolbar">
    <button class="btn" id="headerProfile">👤 プロフィール</button>
    <button class="btn primary" id="headerAdd">➕ 追加</button>
    <button class="btn success" id="headerExport">🚀 全出力</button>
  </div>
</header>

<main id="liveListContainer"></main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-bottom:20px;color:var(--accent);">実績の編集</h3>
    <input type="hidden" id="editYear"><input type="hidden" id="editIndex">
    <div class="form-group">
      <label>画像</label>
      <div class="img-box" id="dropArea">
        <span style="font-size:13px;color:var(--accent);">📷 写真を選択</span>
        <input type="file" id="fileInput" hidden accept="image/*">
        <img id="imgPreview">
      </div>
      <input type="text" id="lThumb" placeholder="または画像URLを入力" style="font-size:11px;">
    </div>
    <div class="form-group"><label>開催日</label><input type="date" id="lFullDate"></div>
    <div class="form-group"><label>イベント名</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式</label><input type="text" id="lFormat"></div>
    <div class="form-group"><label>リンク</label><input type="text" id="lLink"></div>
    <div class="form-group" style="display:flex;gap:12px;align-items:center;background:var(--surface2);padding:15px;border-radius:15px;">
      <input type="checkbox" id="lUpcoming" style="width:25px;height:25px;">
      <label style="margin:0;font-weight:700;">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗... として表示</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:25px;">
      <button class="btn" id="btnCancel">戻る</button>
      <button class="btn primary" id="btnSaveLive" style="flex:1;">保存する</button>
    </div>
    <button id="btnDelete" style="width:100%;background:none;border:none;color:var(--muted);font-size:11px;margin-top:20px;text-decoration:underline;padding:10px;">削除</button>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px;">全コード出力</h3>
    <textarea id="exportText" style="width:100%;height:350px;font-size:10px;background:#000;color:#0f0;padding:12px;border-radius:10px;border:none;" readonly></textarea>
    <button class="btn primary" id="copyBtn" style="width:100%;padding:15px;margin-top:10px;">📋 全コピーする</button>
  </div>
</div>

<script>
// --- フライヤー画像URLを含めた完全データ復旧 ---
let SITE_DATA = {"profile":{"name":"1048ライブ運営/ツール販売","sub":"Live Event Producer","desc":"2012年~2020年まで歌い手として活動。2015年~現在に至るまで約100本のライブ主催と運営を担当。","twitter":"https://x.com/toshiyanman1227","tools":[]},"lives":{"2023":[{"date":"11/23","fullDate":"2023-11-23","role":"運営","title":"Good Meat Good Meet","format":"2部制インスト","link":"https://twitter.com/gmgm_2023","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/c4b261f0-6561-40a0-9a8d-5e0e0e29c9d6.jpeg"}],"2024":[{"date":"1/20","fullDate":"2024-01-20","role":"運営","title":"みんなでパジャマパーティ","format":"1部制インスト/配信有","link":"https://twitter.com/maku_live","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/8cb1c7dc-3f79-4df5-af6d-f75f5d7e1566.jpeg"},{"date":"3/2","fullDate":"2024-03-02","role":"運営","title":"謳歌〜ファンファーレ〜","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/16604dee-23b1-47b2-9d42-547c5d7e61c4.jpeg"},{"date":"4/29","fullDate":"2024-04-29","role":"運営","title":"CLOVER PLAYHOUSE","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/294471e2-4e8c-424b-95f7-c3cfa90a0126.png"},{"date":"6/1","fullDate":"2024-06-01","role":"運営","title":"GMGM -calm echoes day-","format":"アコースティック","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/14210640-10d5-4cec-b110-64dffdd6a52d.jpeg"},{"date":"8/17","fullDate":"2024-08-17","role":"主催","title":"Unison","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/ac1d6e3d-c7c5-4a05-92fc-88830c02860e.png"},{"date":"9/28","fullDate":"2024-09-28","role":"主催","title":"古-壱-","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/9ab3089d-6bcf-4cc7-8ac7-f861f94fc57a.jpeg"},{"date":"10/15","fullDate":"2024-10-15","role":"運営補佐","title":"SIGNAL","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/948543a9-5781-4347-8e23-896c56e83761.png"},{"date":"11/25","fullDate":"2024-11-25","role":"運営","title":"Good Meat Good Meet 2","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{"date":"12/15","fullDate":"2024-12-15","role":"運営","title":"Floralia -Camelia-","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/5f95b4e5-d731-4f18-8eeb-96770ec967fa.jpeg"}],"2025":[{"date":"1/25","fullDate":"2025-01-25","role":"運営","title":"みんなでパジャマパーティ 2","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/81341d32-7e8f-4f59-8a88-7a29de241666.jpeg"},{"date":"2/8","fullDate":"2025-02-08","role":"主催","title":"古-弐-","format":"2部制インスト/バンド","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"}],"2026":[{"date":"5/16","fullDate":"2026-05-16","role":"主催","title":"Unison Final","format":"2部制インスト","upcoming":true,"thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/e981f470-f417-4050-8021-f13e9b87946c.jpeg"}]}};

// 復元処理
const saved = localStorage.getItem('1048_master_v6');
if(saved) SITE_DATA = JSON.parse(saved);

function save() { localStorage.setItem('1048_master_v6', JSON.stringify(SITE_DATA)); }

function render() {
  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);
  const getDay = (d) => ["日","月","火","水","木","金","土"][new Date(d).getDay() || 0];

  years.forEach(year => {
    SITE_DATA.lives[year].sort((a,b)=>new Date(b.fullDate) - new Date(a.fullDate));
    if(SITE_DATA.lives[year].length === 0) return;
    container.innerHTML += `<div class="section-title">${year}年</div>`;
    SITE_DATA.lives[year].forEach((l, idx) => {
      const div = document.createElement('div');
      div.className = 'live-item';
      // touchイベントでの反応を優先
      div.addEventListener('click', (e) => { e.preventDefault(); editLive(year, idx); });
      div.innerHTML = `
        <img src="${l.thumb || ''}" class="live-thumb-preview" onerror="this.style.display='none'">
        <div class="live-info">
          <div class="live-info-title">${l.title || '無題'}</div>
          <div class="live-info-sub">${l.date}(${getDay(l.fullDate)}) | ${l.role}${l.upcoming?'<span class="tag-coming">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗...</span>':''}</div>
        </div>
        <div style="color:var(--muted); font-size:20px;">›</div>
      `;
      container.appendChild(div);
    });
  });
}

// 編集画面
function editLive(year, idx) {
  const l = SITE_DATA.lives[year][idx];
  document.getElementById('editYear').value = year;
  document.getElementById('editIndex').value = idx;
  document.getElementById('lFullDate').value = l.fullDate;
  document.getElementById('lTitle').value = l.title;
  document.getElementById('lRole').value = l.role;
  document.getElementById('lFormat').value = l.format;
  document.getElementById('lLink').value = l.link;
  document.getElementById('lThumb').value = l.thumb || "";
  document.getElementById('lUpcoming').checked = !!l.upcoming;
  
  const img = document.getElementById('imgPreview');
  if(l.thumb) { img.src = l.thumb; img.classList.add('active'); } else { img.classList.remove('active'); }
  document.getElementById('liveModal').classList.add('open');
}

// 保存ボタン
document.getElementById('btnSaveLive').onclick = () => {
  const fDate = document.getElementById('lFullDate').value;
  if(!fDate) return;
  const d = new Date(fDate);
  const year = d.getFullYear().toString();
  const newItem = {
    date: `${d.getMonth()+1}/${d.getDate()}`, fullDate: fDate, 
    role: document.getElementById('lRole').value, title: document.getElementById('lTitle').value,
    format: document.getElementById('lFormat').value, link: document.getElementById('lLink').value,
    thumb: document.getElementById('lThumb').value, upcoming: document.getElementById('lUpcoming').checked
  };

  const oldYear = document.getElementById('editYear').value;
  const oldIdx = document.getElementById('editIndex').value;
  if(oldIdx !== '') SITE_DATA.lives[oldYear].splice(oldIdx, 1);
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  SITE_DATA.lives[year].push(newItem);
  save(); render(); document.getElementById('liveModal').classList.remove('open');
};

// その他ツール
document.getElementById('headerAdd').onclick = () => {
  document.getElementById('editIndex').value = '';
  document.getElementById('lFullDate').value = new Date().toISOString().split('T')[0];
  ['lTitle','lFormat','lLink','lThumb'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('imgPreview').classList.remove('active');
  document.getElementById('lUpcoming').checked = false;
  document.getElementById('liveModal').classList.add('open');
};

document.getElementById('btnCancel').onclick = () => document.getElementById('liveModal').classList.remove('open');

document.getElementById('headerExport').onclick = () => {
  document.getElementById('exportText').value = document.documentElement.outerHTML;
  document.getElementById('exportModal').classList.add('open');
};

document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('exportText').value);
  alert("コピー完了！GitHubに貼り付けてください。");
};

// 画像選択
document.getElementById('dropArea').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('lThumb').value = ev.target.result;
    document.getElementById('imgPreview').src = ev.target.result;
    document.getElementById('imgPreview').classList.add('active');
  };
  reader.readAsDataURL(e.target.files[0]);
};

render();
</script>
</body>
</html>
