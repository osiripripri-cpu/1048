<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6a8a;--gold:#c9a84c;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:relative;z-index:1;padding:30px 18px 20px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);}
.header-name{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:800;color:var(--accent);margin-bottom:10px;}
.admin-toolbar{display:flex;justify-content:center;gap:10px;margin-top:15px;flex-wrap:wrap;}
.btn{padding:10px 16px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-width:140px;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.success{background:var(--accent2);border-color:var(--accent2);color:#fff;}
main{padding:20px 14px 100px;max-width:800px;margin:0 auto;}
.section-title{font-size:14px;color:var(--muted);margin:30px 0 10px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.live-list{display:grid;gap:10px;}
.live-item{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:6px;display:grid;grid-template-columns:50px 1fr 60px;gap:12px;align-items:center;}
.live-thumb-preview{width:50px;height:50px;background:var(--surface2);border-radius:4px;object-fit:cover;}
.live-info{overflow:hidden;}
.live-info-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.live-info-sub{font-size:10px;color:var(--muted);display:flex;gap:8px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:500px;padding:24px;border-radius:8px;max-height:90vh;overflow-y:auto;}
.modal-h2{font-size:18px;margin-bottom:20px;color:var(--accent);}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-family:inherit;font-size:13px;}
.image-upload-area{border:2px dashed var(--border);padding:15px;text-align:center;border-radius:4px;margin-bottom:10px;cursor:pointer;}
.image-preview-large{width:100%;height:150px;object-fit:contain;background:#000;margin-top:10px;border-radius:4px;display:none;}
.image-preview-large.active{display:block;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btns button{flex:1;padding:12px;}
#exportText{width:100%;height:300px;background:#000;color:#0f0;font-family:monospace;font-size:11px;padding:10px;margin-bottom:10px;}
</style>
</head>
<body>

<header>
  <div class="header-name">1048 Web管理画面</div>
  <div class="admin-toolbar">
    <button class="btn" onclick="openProfileModal()">👤 プロフィール・ツール</button>
    <button class="btn primary" onclick="openLiveModal()">➕ ライブ実績追加</button>
    <button class="btn success" id="btnExport">🚀 公開用コード書き出し</button>
  </div>
</header>

<main id="liveListContainer"></main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h2 class="modal-h2">ライブ実績の登録</h2>
    <div class="form-group">
      <label>サムネイル画像</label>
      <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
        <span style="font-size:12px;">📁 画像を選択</span>
        <input type="file" id="fileInput" hidden accept="image/*">
        <img id="imgPreview" class="image-preview-large">
      </div>
      <input type="text" id="lThumb" placeholder="画像URL（自動入力されます）">
    </div>
    <div class="form-group"><label>開催年</label><input type="number" id="lYear" value="2026"></div>
    <div class="form-group"><label>日付 (10/17)</label><input type="text" id="lDate"></div>
    <div class="form-group"><label>タイトル</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式</label><input type="text" id="lFormat"></div>
    <div class="form-group"><label>詳細リンク</label><input type="text" id="lLink"></div>
    <div class="form-group" style="display:flex;gap:10px;"><input type="checkbox" id="lUpcoming" style="width:auto;"><label>今後開催</label></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeLiveModal()">キャンセル</button>
      <button class="btn primary" id="btnSaveLive">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-content">
    <h2 class="modal-h2">プロフィール & ツール設定</h2>
    <div class="form-group"><label>名前</label><input type="text" id="hName"></div>
    <div class="form-group"><label>肩書き</label><input type="text" id="hSub"></div>
    <div class="form-group"><label>自己紹介</label><textarea id="hDesc"></textarea></div>
    <div class="form-group"><label>Twitter URL</label><input type="text" id="hTwitter"></div>
    <div id="boothInputs"></div>
    <div class="modal-btns"><button class="btn" onclick="document.getElementById('profileModal').classList.remove('open')">キャンセル</button><button class="btn primary" id="btnSaveProfile">保存</button></div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content" style="max-width:700px;">
    <h2 class="modal-h2">公開用コード</h2>
    <textarea id="exportText" readonly></textarea>
    <button class="btn primary" id="copyBtn">📋 コピーする</button>
    <button class="btn" style="margin-top:10px;" onclick="document.getElementById('exportModal').classList.remove('open')">閉じる</button>
  </div>
</div>

<script>
/* データをここに統合 */

rmat":"2部制インスト/バンド","link":"https://twitter.com/info_inishie","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{"date":"4/26","role":"運営","title":"CLOVER PLAYHOUSE 2","organizer":"主催：LamL_Chop様","format":"2部制インスト","link":"https://twitter.com/clovers_info","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b5d5b201-1224-4172-8522-e5f39a5dc55a.jpeg"},{"date":"5/11","role":"運営スタッフ","title":"＋α (ぷらすあるふぁ)","organizer":"主催：あさぎ様","format":"2部制インスト","link":"https://twitter.com/plus10arufa","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/aa9dce0e-1065-4357-a00f-f1806c307007.jpeg"},{"date":"5/17","role":"主催","title":"Unison 2","organizer":"","format":"2部制インスト","link":"https://twitter.com/liveunison_info","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/106ad0c0-69de-4a6b-a157-21bd85b4d027.jpeg"},{"date":"8/23","role":"運営スタッフ","title":"FLASH","organizer":"主催：あさぎ様","format":"2部制インスト","link":"https://twitter.com/FLASH823_","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/0cec54c4-815b-4cf1-b439-1f0245fc34e7.jpeg"},{"date":"10/12","role":"主催","title":"みにしえ-壱-","organizer":"","format":"1部制インスト","link":"","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/37285f86-cd13-452b-bd21-ceeb498fc89c.png"},{"date":"12/20","role":"運営","title":"Bar Ecrin","organizer":"主催：洒落様","format":"1部制インスト","link":"","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/6bc7535d-480c-4b2c-8723-2c045552d6aa.jpeg"}],"2026":[{"date":"1/31","role":"主催","title":"古-参-","organizer":"","format":"2部制インスト/バンド","link":"https://twitter.com/info_inishie","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/2a9beb5c-3a71-4e1d-94b9-d0c3ed5a9d81.jpeg"},{"date":"2/22","role":"運営スタッフ","title":"DPMN","organizer":"主催：らりー様","format":"2部制インスト/バンド","link":"","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/907fcc14-4049-47b9-ba4f-a7240b9cc39a.jpeg"},{"date":"4/11","role":"運営","title":"オトヲアビロ vol.1","organizer":"主催：ウトガワ様","format":"2部制インスト/バンド","link":"https://twitter.com/otoabi_live_","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/3d5ddd75-7cc3-40cc-bd91-17db7a7e17af.jpeg"},{"date":"5/16","role":"主催","title":"Unison Final","organizer":"","format":"2部制インスト","link":"https://twitter.com/liveunison_info","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/e981f470-f417-4050-8021-f13e9b87946c.jpeg","upcoming":true},{"date":"7/11","role":"運営","title":"（調整中）","organizer":"","format":"","link":"","thumb":"","upcoming":true},{"date":"7/19","role":"主催","title":"Osiri.Chorus.Project -Encore-","organizer":"","format":"1部制インスト","link":"https://twitter.com/OCP0318","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/8529647c-aeb1-477c-ac2c-4659bd36df0b.png","upcoming":true},{"date":"9/20-21","role":"主催","title":"みにしえ-?-","organizer":"","format":"2days インスト","link":"https://twitter.com/info_inishie","thumb":"","upcoming":true},{"date":"10/17","role":"主催","title":"古-終-","organizer":"","format":"2部制バンド","link":"https://twitter.com/info_inishie","thumb":"","upcoming":true}]}};

/* ローカルストレージ復元 */
const saved = localStorage.getItem('1048_admin_data');
if(saved) SITE_DATA = JSON.parse(saved);

function renderLiveList() {
  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);
  years.forEach(year => {
    container.innerHTML += `<div class="section-title">${year}年実績</div><div class="live-list" id="list-${year}"></div>`;
    const list = document.getElementById(`list-${year}`);
    SITE_DATA.lives[year].forEach((live, index) => {
      list.innerHTML += `<div class="live-item"><img src="${live.thumb || ''}" class="live-thumb-preview"><div class="live-info"><div class="live-info-title">${live.title}</div><div class="live-info-sub"><span>${live.date}</span><span>${live.role}</span></div></div><button class="btn" onclick="deleteLive('${year}', ${index})" style="min-width:auto; border:none; color:var(--accent2); background:none; font-size:11px;">削除</button></div>`;
    });
  });
}

// 画像アップロード処理
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('lThumb').value = e.target.result;
    const img = document.getElementById('imgPreview');
    img.src = e.target.result; img.classList.add('active');
  };
  reader.readAsDataURL(file);
});

function openLiveModal() {
  document.getElementById('imgPreview').classList.remove('active');
  ['lThumb','lTitle','lDate','lFormat','lLink'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('liveModal').classList.add('open');
}
function closeLiveModal() { document.getElementById('liveModal').classList.remove('open'); }

document.getElementById('btnSaveLive').addEventListener('click', () => {
  const year = document.getElementById('lYear').value;
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  SITE_DATA.lives[year].unshift({
    date: document.getElementById('lDate').value,
    role: document.getElementById('lRole').value,
    title: document.getElementById('lTitle').value,
    organizer: "", format: document.getElementById('lFormat').value,
    link: document.getElementById('lLink').value,
    thumb: document.getElementById('lThumb').value,
    upcoming: document.getElementById('lUpcoming').checked
  });
  saveAndRender(); closeLiveModal();
});

function deleteLive(year, index) {
  if(confirm('削除しますか？')) { SITE_DATA.lives[year].splice(index, 1); saveAndRender(); }
}

function saveAndRender() {
  localStorage.setItem('1048_admin_data', JSON.stringify(SITE_DATA));
  renderLiveList();
}

/* プロフィール編集 */
function openProfileModal() {
  const p = SITE_DATA.profile;
  document.getElementById('hName').value = p.name;
  document.getElementById('hSub').value = p.sub;
  document.getElementById('hDesc').value = p.desc;
  document.getElementById('hTwitter').value = p.twitter;
  const container = document.getElementById('boothInputs');
  container.innerHTML = '<h2 class="modal-h2" style="margin-top:20px;">ツール設定</h2>';
  p.tools.forEach((t, i) => {
    container.innerHTML += `<div style="background:var(--surface2); padding:10px; margin-bottom:10px; border-radius:4px;"><div style="display:grid; grid-template-columns:50px 1fr 1fr; gap:5px; margin-bottom:5px;"><input type="text" id="tIcon${i}" value="${t.icon}"><input type="text" id="tName${i}" value="${t.name}"><input type="text" id="tNote${i}" value="${t.note}"></div><input type="text" id="tUrl${i}" value="${t.url}"></div>`;
  });
  document.getElementById('profileModal').classList.add('open');
}

document.getElementById('btnSaveProfile').addEventListener('click', () => {
  const p = SITE_DATA.profile;
  p.name = document.getElementById('hName').value; p.sub = document.getElementById('hSub').value;
  p.desc = document.getElementById('hDesc').value; p.twitter = document.getElementById('hTwitter').value;
  p.tools = [];
  for(let i=0; i<4; i++) {
    p.tools.push({ icon: document.getElementById(`tIcon${i}`).value, name: document.getElementById(`tName${i}`).value, note: document.getElementById(`tNote${i}`).value, url: document.getElementById(`tUrl${i}`).value });
  }
  saveAndRender(); document.getElementById('profileModal').classList.remove('open');
});

document.getElementById('btnExport').addEventListener('click', () => {
  document.getElementById('exportText').value = `const SITE_DATA = ${JSON.stringify(SITE_DATA)};`;
  document.getElementById('exportModal').classList.add('open');
});

document.getElementById('copyBtn').addEventListener('click', () => {
  document.getElementById('exportText').select(); document.execCommand('copy');
  alert('コピーしました！');
});

renderLiveList();
</script>
</body>
</html>
