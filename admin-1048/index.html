<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 LIVE ADMIN - PERFECT EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#16161f;--surface2:#1f1f2e;--border:#2e2e3f;--accent:#7c6aff;--blue:#00a2ff;--text:#e8e6f0;--muted:#8b88a1;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;line-height:1.6;padding-bottom:100px;}

/* ヘッダー */
header{position:sticky;top:0;z-index:100;padding:15px;background:rgba(10,10,15,0.9);backdrop-filter:blur(15px);border-bottom:1px solid var(--border);}
.header-title{font-family:'Shippori Mincho';font-size:20px;text-align:center;color:var(--accent);margin-bottom:10px;letter-spacing:1px;}
.admin-toolbar{display:flex;justify-content:center;gap:12px;}

/* 共通ボタン */
.btn{padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:0.2s;}
.btn:active{transform:scale(0.95);background:var(--border);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-success{background:#22c55e;border-color:#22c55e;color:#fff;}

/* リスト表示 */
main{max-width:600px;margin:0 auto;padding:15px;}
.year-divider{font-size:12px;font-weight:800;color:var(--muted);margin:30px 0 15px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:1px;}
.year-divider::after{content:'';flex:1;height:1px;background:var(--border);}

.live-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:12px;display:grid;grid-template-columns:70px 1fr 20px;gap:15px;align-items:center;cursor:pointer;position:relative;overflow:hidden;}
.live-card:active{background:var(--surface2);}
.live-img{width:70px;height:70px;background:#000;border-radius:10px;object-fit:cover;}
.live-content{min-width:0;}
.live-title{font-size:15px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.live-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.coming-soon{color:var(--blue);font-family:'Times New Roman',serif;font-weight:900;letter-spacing:0.5px;font-style:italic;}

/* モーダル */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:480px;padding:25px;border-radius:24px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.5);}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.form-group input, .form-group select, .form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;font-size:16px;outline:none;font-family:inherit;}
.form-group input:focus{border-color:var(--accent);}
</style>
</head>
<body>

<header>
  <div class="header-title">1048 LIVE ARCHIVE</div>
  <div class="admin-toolbar">
    <button class="btn" onclick="openProfileModal()">👤 プロフィール</button>
    <button class="btn btn-primary" onclick="addNewLive()">➕ ライブ追加</button>
    <button class="btn btn-success" onclick="openExportModal()">🚀 全出力</button>
  </div>
</header>

<main id="liveListContainer"></main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h2 id="modalTitle" style="margin-bottom:20px;color:var(--accent);">実績の編集</h2>
    <input type="hidden" id="editYear"><input type="hidden" id="editIndex">
    <div class="form-group">
      <label>フライヤー画像URL</label>
      <input type="text" id="lThumb" placeholder="https://...">
      <div id="imgPreviewContainer" style="margin-top:10px;text-align:center;">
        <img id="imgPreview" style="max-width:100%;max-height:150px;border-radius:10px;display:none;">
      </div>
    </div>
    <div class="form-group"><label>開催日</label><input type="date" id="lFullDate"></div>
    <div class="form-group"><label>イベント名</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式 (バンド/インスト等)</label><input type="text" id="lFormat"></div>
    <div class="form-group" style="display:flex;gap:12px;align-items:center;background:var(--surface2);padding:15px;border-radius:15px;">
      <input type="checkbox" id="lUpcoming" style="width:24px;height:24px;">
      <label style="margin:0;font-weight:700;">Coming soon... 表示にする</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:25px;">
      <button class="btn" onclick="closeModal('liveModal')" style="flex:1;">戻る</button>
      <button class="btn btn-primary" onclick="saveLive()" style="flex:2;">変更を保存</button>
    </div>
    <button onclick="deleteLive()" style="width:100%;margin-top:20px;background:none;border:none;color:var(--muted);text-decoration:underline;font-size:11px;">実績を削除する</button>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-content">
    <h2 style="margin-bottom:20px;color:var(--accent);">プロフィール管理</h2>
    <div class="form-group"><label>名前</label><input type="text" id="pName"></div>
    <div class="form-group"><label>自己紹介文</label><textarea id="pDesc" rows="6"></textarea></div>
    <div class="form-group"><label>Twitter URL</label><input type="text" id="pTwitter"></div>
    <div style="display:flex;gap:10px;margin-top:25px;">
      <button class="btn" onclick="closeModal('profileModal')" style="flex:1;">戻る</button>
      <button class="btn btn-primary" onclick="saveProfile()" style="flex:2;">保存する</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content">
    <h2 style="margin-bottom:10px;">GitHub上書き用コード</h2>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px;">以下のコードをコピーして GitHub の index.html をまるごと貼り替えてください。</p>
    <textarea id="exportText" style="width:100%;height:300px;font-size:10px;background:#000;color:#22c55e;padding:12px;border-radius:12px;border:none;font-family:monospace;" readonly></textarea>
    <button class="btn btn-primary" onclick="copyCode()" style="width:100%;margin-top:15px;padding:15px;">📋 まるごとコピー</button>
  </div>
</div>

<script>
// --- 全26公演 完全精査済みデータシート ---
let SITE_DATA = {"profile":{"name":"1048ライブ運営/ツール販売","desc":"2012年~2020年まで歌い手として活動。2015年~現在に至るまで約100本のライブ主催と運営を担当しました。運営/スタッフのご依頼はお気軽にお声掛けください。","twitter":"https://x.com/toshiyanman1227"},"lives":{"2023":[{"date":"11/23","fullDate":"2023-11-23","role":"運営","title":"Good Meat Good Meet","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/c4b261f0-6561-40a0-9a8d-5e0e0e29c9d6.jpeg"}],"2024":[{"date":"1/20","fullDate":"2024-01-20","role":"運営","title":"みんなでパジャマパーティ","format":"1部制インスト/配信有","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/8cb1c7dc-3f79-4df5-af6d-f75f5d7e1566.jpeg"},{"date":"3/2","fullDate":"2024-03-02","role":"運営","title":"謳歌〜ファンファーレ〜","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/16604dee-23b1-47b2-9d42-547c5d7e61c4.jpeg"},{"date":"4/29","fullDate":"2024-04-29","role":"運営","title":"CLOVER PLAYHOUSE","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/294471e2-4e8c-424b-95f7-c3cfa90a0126.png"},{"date":"6/1","fullDate":"2024-06-01","role":"運営","title":"GMGM -calm echoes day-","format":"アコースティック","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/14210640-10d5-4cec-b110-64dffdd6a52d.jpeg"},{"date":"8/17","fullDate":"2024-08-17","role":"主催","title":"Unison","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/ac1d6e3d-c7c5-4a05-92fc-88830c02860e.png"},{"date":"9/28","fullDate":"2024-09-28","role":"主催","title":"古-壱-","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/9ab3089d-6bcf-4cc7-8ac7-f861f94fc57a.jpeg"},{"date":"10/15","fullDate":"2024-10-15","role":"運営補佐","title":"SIGNAL","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/948543a9-5781-4347-8e23-896c56e83761.png"},{"date":"11/25","fullDate":"2024-11-25","role":"運営","title":"Good Meat Good Meet 2","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{"date":"12/15","fullDate":"2024-12-15","role":"運営","title":"Floralia -Camelia-","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/5f95b4e5-d731-4f18-8eeb-96770ec967fa.jpeg"},{"date":"12/28","fullDate":"2024-12-28","role":"運営","title":"1048 Winter Live","format":"1部制バンド"}],"2025":[{"date":"1/25","fullDate":"2025-01-25","role":"運営","title":"みんなでパジャマパーティ 2","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/81341d32-7e8f-4f59-8a88-7a29de241666.jpeg"},{"date":"2/8","fullDate":"2025-02-08","role":"主催","title":"古-弐-","format":"2部制インスト/バンド","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{"date":"4/26","fullDate":"2025-04-26","role":"運営","title":"CLOVER PLAYHOUSE 2","format":"2部制インスト"},{"date":"5/11","fullDate":"2025-05-11","role":"運営スタッフ","title":"＋α","format":"2部制インスト"},{"date":"5/17","fullDate":"2025-05-17","role":"主催","title":"Unison 2","format":"2部制インスト"},{"date":"6/21","fullDate":"2025-06-21","role":"運営","title":"Summer Fes 2025","format":"野外ライブ"},{"date":"8/23","fullDate":"2025-08-23","role":"運営スタッフ","title":"FLASH","format":"2部制インスト"},{"date":"10/12","fullDate":"2025-10-12","role":"主催","title":"みにしえ-壱-","format":"1部制インスト"},{"date":"11/15","fullDate":"2025-11-15","role":"運営","title":"Autumn Harmony","format":"1部制インスト"},{"date":"12/20","fullDate":"2025-12-20","role":"運営","title":"Bar Ecrin","format":"1部制インスト"}],"2026":[{"date":"1/31","fullDate":"2026-01-31","role":"主催","title":"古-参-","format":"2部制バンド"},{"date":"2/22","fullDate":"2026-02-22","role":"運営スタッフ","title":"DPMN","format":"2部制バンド"},{"date":"4/11","fullDate":"2026-04-11","role":"運営","title":"オトヲアビロ vol.1","format":"2部制バンド"},{"date":"5/16","fullDate":"2026-05-16","role":"主催","title":"Unison Final","format":"2部制インスト","upcoming":true,"thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/e981f470-f417-4050-8021-f13e9b87946c.jpeg"},{"date":"10/17","fullDate":"2026-10-17","role":"主催","title":"古-終-","format":"2部制バンド","upcoming":true}]}};

// データの永続化
const SAVED_L_KEY = "1048_master_data_v10";
const savedData = localStorage.getItem(SAVED_L_KEY);
if(savedData) SITE_DATA = JSON.parse(savedData);
function updateStorage(){ localStorage.setItem(SAVED_L_KEY, JSON.stringify(SITE_DATA)); }

// リスト描画
function render() {
  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);

  years.forEach(year => {
    container.innerHTML += `<div class="year-divider">${year} ARCHIVE</div>`;
    SITE_DATA.lives[year].sort((a,b)=>new Date(b.fullDate) - new Date(a.fullDate)).forEach((live, idx) => {
      const card = document.createElement('div');
      card.className = 'live-card';
      card.onclick = () => editLive(year, idx);
      card.innerHTML = `
        <img src="${live.thumb || ''}" class="live-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxIDEiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMzMzMiLz48L3N2Zz4='">
        <div class="live-content">
          <div class="live-title">${live.title || 'Untitled'}</div>
          <div class="live-meta">
            <span>${live.date}</span> | <span>${live.role}</span>
            ${live.upcoming ? '<span class="coming-soon">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗...</span>' : ''}
          </div>
        </div>
        <div style="color:var(--muted); font-weight:bold;">›</div>
      `;
      container.appendChild(card);
    });
  });
}

// 編集機能
function editLive(year, idx) {
  const l = SITE_DATA.lives[year][idx];
  document.getElementById('editYear').value = year;
  document.getElementById('editIndex').value = idx;
  document.getElementById('lTitle').value = l.title;
  document.getElementById('lFullDate').value = l.fullDate;
  document.getElementById('lRole').value = l.role;
  document.getElementById('lFormat').value = l.format || '';
  document.getElementById('lThumb').value = l.thumb || '';
  document.getElementById('lUpcoming').checked = !!l.upcoming;
  document.getElementById('liveModal').classList.add('open');
}

function saveLive() {
  const fDate = document.getElementById('lFullDate').value;
  if(!fDate) return;
  const d = new Date(fDate);
  const year = d.getFullYear().toString();
  const newItem = {
    date: `${d.getMonth()+1}/${d.getDate()}`, fullDate: fDate,
    role: document.getElementById('lRole').value, title: document.getElementById('lTitle').value,
    format: document.getElementById('lFormat').value, thumb: document.getElementById('lThumb').value,
    upcoming: document.getElementById('lUpcoming').checked
  };
  const oldYear = document.getElementById('editYear').value;
  const oldIdx = document.getElementById('editIndex').value;
  if(oldIdx !== '') SITE_DATA.lives[oldYear].splice(oldIdx, 1);
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  SITE_DATA.lives[year].push(newItem);
  updateStorage(); render(); closeModal('liveModal');
}

function addNewLive() {
  document.getElementById('editYear').value = '';
  document.getElementById('editIndex').value = '';
  document.getElementById('lFullDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('lTitle').value = '';
  document.getElementById('lThumb').value = '';
  document.getElementById('lUpcoming').checked = false;
  document.getElementById('liveModal').classList.add('open');
}

function deleteLive() {
  if(!confirm('削除しますか？')) return;
  const y = document.getElementById('editYear').value;
  const i = document.getElementById('editIndex').value;
  SITE_DATA.lives[y].splice(i, 1);
  updateStorage(); render(); closeModal('liveModal');
}

// プロフィール機能
function openProfileModal() {
  const p = SITE_DATA.profile;
  document.getElementById('pName').value = p.name;
  document.getElementById('pDesc').value = p.desc;
  document.getElementById('pTwitter').value = p.twitter;
  document.getElementById('profileModal').classList.add('open');
}
function saveProfile() {
  SITE_DATA.profile.name = document.getElementById('pName').value;
  SITE_DATA.profile.desc = document.getElementById('pDesc').value;
  SITE_DATA.profile.twitter = document.getElementById('pTwitter').value;
  updateStorage(); closeModal('profileModal');
}

// 出力機能
function openExportModal() {
  document.getElementById('exportText').value = document.documentElement.outerHTML;
  document.getElementById('exportModal').classList.add('open');
}
function copyCode() {
  const area = document.getElementById('exportText');
  area.select();
  document.execCommand('copy');
  alert("コピーしました！GitHubの index.html を書き換えてください。");
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

render();
</script>
</body>
</html>
