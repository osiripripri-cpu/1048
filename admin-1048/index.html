<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フライヤー制作依頼書ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #faf8f4;
  --paper2: #f2ede4;
  --accent: #8b2e2e;
  --accent2: #c4784a;
  --gold: #c9a84c;
  --line: #d4c9b8;
  --muted: #8a7d6e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--paper2);
  color: var(--ink);
  min-height: 100vh;
}

/* ===== HEADER ===== */
.app-header {
  background: var(--ink);
  color: var(--paper);
  padding: 1.2rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.app-header .logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--gold);
}
.app-header .subtitle {
  font-size: 0.75rem;
  color: #aaa;
  margin-left: auto;
}
.btn-print {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.55rem 1.6rem;
  border-radius: 4px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.2s;
}
.btn-print:hover { background: #a33a3a; }

/* ===== MAIN FORM ===== */
.form-wrap {
  max-width: 700px;
  margin: 2rem auto;
  padding: 0 1.5rem 4rem;
}

.section-label {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--accent);
  border-bottom: 1px solid var(--accent);
  padding-bottom: 0.3rem;
  margin-bottom: 1.1rem;
  margin-top: 2rem;
}
.section-label:first-child { margin-top: 0; }

.field { margin-bottom: 1rem; }
.field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 0.35rem;
  letter-spacing: 0.05em;
}
.field input[type=text],
.field input[type=date],
.field textarea,
.field select {
  width: 100%;
  border: 1px solid var(--line);
  background: white;
  border-radius: 6px;
  padding: 0.55rem 0.8rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent2);
}
.field textarea { resize: vertical; line-height: 1.7; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }

/* ===== DATES ===== */
.dates-list { display: flex; flex-direction: column; gap: 0.6rem; }
.date-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
}
.date-row input[type=date] {
  border: none;
  background: transparent;
  padding: 0;
  font-size: 0.88rem;
  flex: 1;
  outline: none;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
}
.date-dow {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--accent2);
  min-width: 2.5rem;
  text-align: center;
}
.btn-rm {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  padding: 0 0.1rem;
}
.btn-rm:hover { color: var(--accent); }

.btn-add {
  background: none;
  border: 1px dashed var(--line);
  border-radius: 6px;
  color: var(--muted);
  font-size: 0.82rem;
  padding: 0.5rem;
  width: 100%;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
  margin-top: 0.4rem;
}
.btn-add:hover { border-color: var(--accent2); color: var(--accent2); }

/* ===== PARTS TOGGLE ===== */
.parts-toggle {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.part-btn {
  flex: 1;
  padding: 0.5rem;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: white;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.part-btn.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}

.part-section {
  background: white;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 0.8rem;
}
.part-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 0.8rem;
}
.part-inner { display: flex; flex-direction: column; gap: 0.6rem; }
.part-inner label {
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 0.2rem;
  display: block;
}
.part-inner input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 0.45rem 0.7rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  color: var(--ink);
  outline: none;
}
.part-inner input:focus { border-color: var(--accent2); }

/* ===== PERFORMERS ===== */
.performers-list { display: flex; flex-direction: column; gap: 0.5rem; }
.performer-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
}
.performer-row .num {
  font-size: 0.7rem;
  color: var(--muted);
  width: 1.4rem;
  flex-shrink: 0;
  text-align: center;
}
.performer-row input {
  border: none;
  background: transparent;
  font-size: 0.85rem;
  color: var(--ink);
  flex: 1;
  outline: none;
  font-family: 'Noto Sans JP', sans-serif;
}
.performer-row input::placeholder { color: #ccc; }

/* ===== COLOR CHIPS ===== */
.color-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
.color-chip {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
  flex-shrink: 0;
}
.color-chip:hover { transform: scale(1.15); }
.color-chip.selected { outline: 2.5px solid var(--ink); outline-offset: 1px; }

/* ===== IMAGE UPLOAD ===== */
.img-upload-area {
  border: 2px dashed var(--line);
  border-radius: 8px;
  padding: 1.2rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  background: white;
}
.img-upload-area:hover { border-color: var(--accent2); background: #fff8f4; }
.img-upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.img-upload-area .upload-text { font-size: 0.8rem; color: var(--muted); }
.img-upload-area img { max-width: 100%; max-height: 140px; border-radius: 4px; display: block; margin: 0 auto; }

/* ===== PRINT ===== */
@media print {
  body { background: white; font-size: 10pt; }
  .app-header, .no-print { display: none !important; }
  .form-wrap { max-width: 100%; margin: 0; padding: 10mm 12mm; }

  .section-label {
    font-size: 8pt;
    margin-top: 6mm;
    margin-bottom: 3mm;
  }
  .field label { font-size: 7pt; margin-bottom: 1mm; }
  .field input, .field textarea, .field select,
  .part-inner input, .date-row input {
    border: 1px solid #ccc !important;
    border-radius: 3px;
    padding: 1mm 2mm;
    font-size: 9pt;
    background: white !important;
  }
  .date-row, .performer-row, .part-section {
    border: 1px solid #ccc !important;
    border-radius: 3px;
    break-inside: avoid;
  }
  .btn-rm, .btn-add, .btn-print, .parts-toggle { display: none !important; }
  .part-section { display: block !important; }
  .img-upload-area img { max-height: 40mm; }
  .color-chip { width: 6mm; height: 6mm; border: 1px solid #ccc; }
  .color-chip.selected { outline: 1.5px solid #333; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">🎭 フライヤー制作依頼書</div>
  <div class="subtitle">入力してPDFで印刷・保存</div>
  <button class="btn-print" onclick="window.print()">🖨 PDFで保存</button>
</header>

<div class="form-wrap">

  <!-- 依頼者情報 -->
  <div class="section-label">📋 依頼者情報</div>
  <div class="row2">
    <div class="field">
      <label>依頼者名 / 主催名</label>
      <input type="text" id="organizer" placeholder="例：1048プロダクション">
    </div>
    <div class="field">
      <label>連絡先（SNS / メール）</label>
      <input type="text" id="contact" placeholder="例：@1048_live">
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>作成日</label>
      <input type="date" id="docdate">
    </div>
    <div class="field">
      <label>依頼No.</label>
      <input type="text" id="docno" placeholder="例：FLY-001">
    </div>
  </div>

  <!-- ライブ基本情報 -->
  <div class="section-label">🎤 ライブ基本情報</div>
  <div class="field">
    <label>ライブ名</label>
    <input type="text" id="livename" placeholder="例：UNISON FINAL">
  </div>
  <div class="field">
    <label>会場</label>
    <input type="text" id="venue" placeholder="例：高円寺HIGH">
  </div>
  <div class="field">
    <label>チケット料金</label>
    <input type="text" id="ticket" placeholder="例：¥3,500 + 1d">
  </div>

  <!-- 開催日 -->
  <div class="section-label">📅 開催日</div>
  <div class="dates-list" id="datesList"></div>
  <button class="btn-add no-print" onclick="addDate()">＋ 開催日を追加</button>

  <!-- 一部・二部 -->
  <div class="section-label">🕐 開場・開演時間</div>
  <div class="parts-toggle no-print">
    <button class="part-btn active" id="btn1part" onclick="setParts(1)">一部のみ</button>
    <button class="part-btn" id="btn2part" onclick="setParts(2)">一部・二部</button>
  </div>

  <div class="part-section" id="part1section">
    <div class="part-section-title">一部</div>
    <div class="row2 part-inner">
      <div>
        <label>開場</label>
        <input type="text" id="open1" placeholder="例：12:00">
      </div>
      <div>
        <label>開演</label>
        <input type="text" id="start1" placeholder="例：12:30">
      </div>
    </div>
  </div>

  <div class="part-section" id="part2section" style="display:none;">
    <div class="part-section-title">二部</div>
    <div class="row2 part-inner">
      <div>
        <label>開場</label>
        <input type="text" id="open2" placeholder="例：18:00">
      </div>
      <div>
        <label>開演</label>
        <input type="text" id="start2" placeholder="例：18:30">
      </div>
    </div>
  </div>

  <!-- 出演者 -->
  <div class="section-label">👤 出演者リスト</div>
  <div class="performers-list" id="performersList"></div>
  <button class="btn-add no-print" onclick="addPerformer()">＋ 出演者を追加</button>

  <!-- デザインイメージ -->
  <div class="section-label">🎨 デザインイメージ</div>
  <div class="field">
    <label>テーマ・雰囲気</label>
    <textarea id="theme" rows="2" placeholder="例：ゴージャス・舞台カーテン・赤黒ゴールド"></textarea>
  </div>
  <div class="field">
    <label>使用カラー（クリックで選択）</label>
    <div class="color-row" id="colorPalette"></div>
  </div>
  <div class="field">
    <label>フォントイメージ</label>
    <input type="text" id="fontimg" placeholder="例：和風・明朝体・英字タイトル">
  </div>
  <div class="field">
    <label>参考フライヤー画像</label>
    <div class="img-upload-area">
      <input type="file" accept="image/*" onchange="loadRefImg(this)">
      <div class="upload-text" id="refImgText">クリックまたはドロップで参考画像をアップロード</div>
      <img id="refImgPreview" style="display:none">
    </div>
  </div>
  <div class="field">
    <label>その他デザイン指示</label>
    <textarea id="designnotes" rows="3" placeholder="例：SNS告知用に正方形版も欲しい、アイコン枠は丸形で..."></textarea>
  </div>

  <!-- 納期・報酬 -->
  <div class="section-label">💴 納期・報酬</div>
  <div class="row2">
    <div class="field">
      <label>初稿納期</label>
      <input type="date" id="deadline1">
    </div>
    <div class="field">
      <label>最終納期</label>
      <input type="date" id="deadline2">
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>報酬</label>
      <input type="text" id="fee" placeholder="例：¥15,000（修正2回まで含む）">
    </div>
    <div class="field">
      <label>支払い方法</label>
      <input type="text" id="payment" placeholder="例：銀行振込・完了後1週間以内">
    </div>
  </div>

  <!-- 禁止事項・注意事項 -->
  <div class="section-label">⚠️ 禁止事項・注意事項</div>
  <div class="row2">
    <div class="field">
      <label>禁止事項</label>
      <textarea id="prohibit" rows="4" placeholder="例：
・二次使用禁止
・SNSへのWIP投稿禁止
・AI生成素材の使用禁止"></textarea>
    </div>
    <div class="field">
      <label>その他注意事項</label>
      <textarea id="caution" rows="4" placeholder="例：納品はPSD＋PNG形式でお願いします"></textarea>
    </div>
  </div>

  <!-- 署名欄 -->
  <div class="section-label">✍️ 署名欄</div>
  <div class="row2">
    <div class="field">
      <label>依頼者（主催）</label>
      <input type="text" placeholder="署名・捺印">
    </div>
    <div class="field">
      <label>受注者（デザイナー）</label>
      <input type="text" placeholder="署名・捺印">
    </div>
  </div>

</div><!-- /form-wrap -->

<script>
// ===== 曜日 =====
const DOW = ['日','月','火','水','木','金','土'];
function getDow(dateStr) {
  if (!dateStr) return '';
  const [y,m,d] = dateStr.split('-').map(Number);
  const day = new Date(y, m-1, d).getDay();
  return DOW[day] + '曜日';
}

// ===== 開催日 =====
let dateCounter = 0;
let dates = [];

function addDate(val='') {
  dateCounter++;
  const id = dateCounter;
  dates.push({id, val});
  renderDates();
}

function removeDate(id) {
  dates = dates.filter(d => d.id !== id);
  renderDates();
}

function renderDates() {
  const el = document.getElementById('datesList');
  el.innerHTML = '';
  dates.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'date-row';
    row.innerHTML = `
      <input type="date" value="${d.val}" oninput="dates[${i}].val=this.value;updateDow(this,${i})">
      <span class="date-dow" id="dow-${d.id}">${d.val ? getDow(d.val) : ''}</span>
      <button class="btn-rm no-print" onclick="removeDate(${d.id})">×</button>
    `;
    el.appendChild(row);
  });
}

function updateDow(input, idx) {
  dates[idx].val = input.value;
  const span = document.getElementById(`dow-${dates[idx].id}`);
  if (span) span.textContent = getDow(input.value);
}

// ===== 一部・二部 =====
let partsMode = 1;

function setParts(n) {
  partsMode = n;
  document.getElementById('btn1part').classList.toggle('active', n === 1);
  document.getElementById('btn2part').classList.toggle('active', n === 2);
  document.getElementById('part2section').style.display = n === 2 ? 'block' : 'none';
}

// ===== 出演者 =====
let performers = [];
let perfCounter = 0;

function addPerformer(name='', unit='') {
  perfCounter++;
  performers.push({id: perfCounter, name, unit});
  renderPerformers();
}

function removePerformer(id) {
  performers = performers.filter(p => p.id !== id);
  renderPerformers();
}

function renderPerformers() {
  const el = document.getElementById('performersList');
  el.innerHTML = '';
  performers.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'performer-row';
    row.innerHTML = `
      <span class="num">${i+1}</span>
      <input type="text" value="${p.name}" placeholder="名前・ユニット名"
        oninput="performers[${i}].name=this.value">
      <input type="text" value="${p.unit}" placeholder="メンバー構成（任意）" style="color:#888"
        oninput="performers[${i}].unit=this.value">
      <button class="btn-rm no-print" onclick="removePerformer(${p.id})">×</button>
    `;
    el.appendChild(row);
  });
}

// ===== カラーパレット =====
const PALETTE = [
  {hex:'#1a1410',label:'黒'},
  {hex:'#8b2e2e',label:'深紅'},
  {hex:'#c4784a',label:'テラコッタ'},
  {hex:'#c9a84c',label:'ゴールド'},
  {hex:'#f5e6c8',label:'クリーム'},
  {hex:'#2c4a7c',label:'ネイビー'},
  {hex:'#3a7c5c',label:'深緑'},
  {hex:'#7c3a7c',label:'紫'},
  {hex:'#e8c5d4',label:'ピンク'},
  {hex:'#4a4a4a',label:'グレー'},
  {hex:'#ffffff',label:'白'},
  {hex:'#d4c9b8',label:'ベージュ'},
];
let selectedColors = [];

function buildPalette() {
  const el = document.getElementById('colorPalette');
  el.innerHTML = '';
  PALETTE.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (selectedColors.includes(c.hex) ? ' selected' : '');
    chip.style.background = c.hex;
    chip.title = c.label;
    if (c.hex === '#ffffff') chip.style.border = '2px solid #ccc';
    chip.onclick = () => {
      selectedColors = selectedColors.includes(c.hex)
        ? selectedColors.filter(x => x !== c.hex)
        : [...selectedColors, c.hex];
      buildPalette();
    };
    el.appendChild(chip);
  });
}

// ===== 参考画像 =====
function loadRefImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('refImgPreview').src = e.target.result;
    document.getElementById('refImgPreview').style.display = 'block';
    document.getElementById('refImgText').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('docdate').value = new Date().toISOString().split('T')[0];
  buildPalette();
  addDate(); // 最初から1行
  addPerformer(); // 最初から1行
});
</script>
</body>
</html>
