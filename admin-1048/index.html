<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 管理画面 PRO v3</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6a8a;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;line-height:1.6;}
header{position:sticky;top:0;z-index:10;padding:15px;text-align:center;border-bottom:1px solid var(--border);background:rgba(13,13,26,0.8);backdrop-filter:blur(10px);}
.admin-toolbar{display:flex;justify-content:center;gap:8px;margin-top:10px;}
.btn{padding:10px 15px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.success{background:var(--accent2);border-color:var(--accent2);color:#fff;}
main{padding:10px 15px 100px;max-width:600px;margin:0 auto;}
.section-title{font-size:12px;color:var(--muted);margin:25px 0 10px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.live-item{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:12px;display:grid;grid-template-columns:60px 1fr auto;gap:12px;align-items:center;margin-bottom:8px;}
.live-thumb-preview{width:60px;height:60px;background:#000;border-radius:6px;object-fit:cover;}
.live-info-title{font-size:14px;font-weight:700;margin-bottom:2px;}
.live-info-sub{font-size:11px;color:var(--muted);}
.tag-upcoming{display:inline-block;padding:2px 6px;background:rgba(255,106,138,0.15);color:var(--accent2);border-radius:4px;font-size:10px;font-weight:700;margin-left:5px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(8px);}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:450px;padding:20px;border-radius:16px;max-height:90vh;overflow-y:auto;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:15px;outline:none;}
.img-box{border:2px dashed var(--border);padding:15px;text-align:center;border-radius:10px;cursor:pointer;}
#imgPreview{width:100%;height:120px;object-fit:contain;margin-top:10px;display:none;}
#imgPreview.active{display:block;}
</style>
</head>
<body>

<header>
  <div style="font-family:'Shippori Mincho';font-size:18px;font-weight:800;color:var(--accent);">1048 LIVE ADMIN</div>
  <div class="admin-toolbar">
    <button class="btn" onclick="openProfileModal()">👤 プロフィール</button>
    <button class="btn primary" onclick="openLiveModal()">➕ ライブ追加</button>
    <button class="btn success" id="btnExport">🚀 コード出力</button>
  </div>
</header>

<main id="liveListContainer"></main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h3 style="margin-bottom:15px;font-size:16px;">ライブ実績の登録</h3>
    <input type="hidden" id="editYear"><input type="hidden" id="editIndex">
    <div class="form-group">
      <label>サムネイル画像</label>
      <div class="img-box" onclick="document.getElementById('fileInput').click()">
        <span style="font-size:12px;color:var(--accent);">📷 画像を選択</span>
        <input type="file" id="fileInput" hidden accept="image/*">
        <img id="imgPreview">
      </div>
      <input type="hidden" id="lThumb">
    </div>
    <div class="form-group"><label>開催日（カレンダーから選択）</label><input type="date" id="lFullDate"></div>
    <div class="form-group"><label>イベントタイトル</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式</label><input type="text" id="lFormat" placeholder="例：2部制インスト"></div>
    <div class="form-group"><label>告知リンクURL</label><input type="text" id="lLink"></div>
    <div class="form-group" style="display:flex;gap:10px;align-items:center;background:var(--surface2);padding:12px;border-radius:10px;">
      <input type="checkbox" id="lUpcoming" style="width:22px;height:22px;">
      <label style="margin:0;font-weight:bold;">今後開催（UPCOMING）として表示</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn" onclick="closeLiveModal()" style="flex:1;">戻る</button>
      <button class="btn primary" id="btnSaveLive" style="flex:2;">保存して更新</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px;">出力コード</h3>
    <textarea id="exportText" style="width:100%;height:200px;font-size:10px;background:#000;color:#0f0;padding:10px;border-radius:8px;border:none;" readonly></textarea>
    <button class="btn primary" id="copyBtn" style="width:100%;padding:15px;margin-top:10px;">📋 コピーして完了</button>
  </div>
</div>

<script>
// --- 初期データ ---
let SITE_DATA = {"profile":{"name":"1048ライブ運営/ツール販売","sub":"Live Event Producer","desc":"2015年~現在に至るまで約100本のライブ主催と運営を担当しました。","twitter":"https://x.com/toshiyanman1227","tools":[]},"lives":{"2023":[],"2024":[],"2025":[],"2026":[]}};

const stored = localStorage.getItem('1048_admin_v5');
if(stored) SITE_DATA = JSON.parse(stored);

function saveAll() { localStorage.setItem('1048_admin_v5', JSON.stringify(SITE_DATA)); }

const getDayW = (dStr) => {
  const days = ["日","月","火","水","木","金","土"];
  return days[new Date(dStr).getDay()];
};

function renderLiveList() {
  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);
  
  years.forEach(year => {
    // 日付順にソート（新しい順）
    SITE_DATA.lives[year].sort((a,b) => {
        const da = a.fullDate || `2000-01-01`;
        const db = b.fullDate || `2000-01-01`;
        return new Date(db) - new Date(da);
    });

    if(SITE_DATA.lives[year].length > 0) {
      container.innerHTML += `<div class="section-title">${year}年</div><div id="list-${year}"></div>`;
      const list = document.getElementById(`list-${year}`);
      SITE_DATA.lives[year].forEach((live, idx) => {
        const item = document.createElement('div');
        item.className = 'live-item';
        item.innerHTML = `
          <img src="${live.thumb || ''}" class="live-thumb-preview">
          <div class="live-info">
            <div class="live-info-title">${live.title}</div>
            <div class="live-info-sub">${live.date}(${getDayW(live.fullDate)}) | ${live.role}${live.upcoming?'<span class="tag-upcoming">今後開催</span>':''}</div>
          </div>
          <button class="btn small" onclick="editLive('${year}', ${idx})">編集</button>
        `;
        list.appendChild(item);
      });
    }
  });
}

function openLiveModal() {
  document.getElementById('editYear').value = '';
  document.getElementById('lThumb').value = '';
  document.getElementById('imgPreview').classList.remove('active');
  document.getElementById('lFullDate').value = new Date().toISOString().split('T')[0];
  ['lTitle','lFormat','lLink'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lUpcoming').checked = false;
  document.getElementById('liveModal').classList.add('open');
}

function editLive(year, idx) {
  const live = SITE_DATA.lives[year][idx];
  document.getElementById('editYear').value = year;
  document.getElementById('editIndex').value = idx;
  document.getElementById('lFullDate').value = live.fullDate || "";
  document.getElementById('lTitle').value = live.title;
  document.getElementById('lRole').value = live.role;
  document.getElementById('lFormat').value = live.format;
  document.getElementById('lLink').value = live.link;
  document.getElementById('lThumb').value = live.thumb || "";
  document.getElementById('lUpcoming').checked = !!live.upcoming;
  
  if(live.thumb) {
    document.getElementById('imgPreview').src = live.thumb;
    document.getElementById('imgPreview').classList.add('active');
  }
  document.getElementById('liveModal').classList.add('open');
}

document.getElementById('btnSaveLive').addEventListener('click', () => {
  const fDate = document.getElementById('lFullDate').value;
  if(!fDate) return alert("日付を選択してください");
  
  const dObj = new Date(fDate);
  const year = dObj.getFullYear().toString();
  const dateStr = `${dObj.getMonth()+1}/${dObj.getDate()}`;
  
  const oldYear = document.getElementById('editYear').value;
  const oldIdx = document.getElementById('editIndex').value;

  const data = {
    date: dateStr,
    fullDate: fDate,
    role: document.getElementById('lRole').value,
    title: document.getElementById('lTitle').value,
    format: document.getElementById('lFormat').value,
    link: document.getElementById('lLink').value,
    thumb: document.getElementById('lThumb').value,
    upcoming: document.getElementById('lUpcoming').checked
  };

  if(oldIdx !== '') {
    SITE_DATA.lives[oldYear].splice(oldIdx, 1);
  }
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  SITE_DATA.lives[year].push(data);
  
  saveAll(); renderLiveList(); closeLiveModal();
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const b64 = ev.target.result;
    document.getElementById('lThumb').value = b64;
    document.getElementById('imgPreview').src = b64;
    document.getElementById('imgPreview').classList.add('active');
  };
  reader.readAsDataURL(file);
});

function closeLiveModal() { document.getElementById('liveModal').classList.remove('open'); }

document.getElementById('btnExport').onclick = () => {
  document.getElementById('exportText').value = `const SITE_DATA = ${JSON.stringify(SITE_DATA)};`;
  document.getElementById('exportModal').classList.add('open');
};

document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('exportText').value);
  alert("コピーしました！GitHubのSITE_DATAを書き換えてください。");
  document.getElementById('exportModal').classList.remove('open');
};

renderLiveList();
</script>
</body>
</html>
