<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 LIVE ADMIN - FINAL RECOVERY</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
<style>
/* ベースサイトのデザインを完全再現 */
:root{--bg:#050507;--surface:#111116;--border:#22222b;--accent:#7c6aff;--blue:#00a2ff;--text:#e8e6f0;--muted:#717180;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding-bottom:100px;line-height:1.5;}

header{position:sticky;top:0;z-index:100;padding:20px 15px;background:rgba(5,5,7,0.9);backdrop-filter:blur(15px);border-bottom:1px solid var(--border);text-align:center;}
.header-title{font-family:'Shippori Mincho';font-size:18px;color:var(--accent);margin-bottom:12px;letter-spacing:2px;}
.admin-toolbar{display:flex;justify-content:center;gap:10px;}

/* ボタン */
.btn{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-export{background:#22c55e;border-color:#22c55e;color:#fff;}

/* プロフィール再現 */
.profile-box{max-width:500px;margin:20px auto;padding:0 20px;text-align:center;}
.profile-name{font-family:'Shippori Mincho';font-size:22px;margin-bottom:5px;}
.profile-desc{font-size:12px;color:var(--muted);white-space:pre-wrap;margin-bottom:15px;}

/* ライブリスト再現 */
main{max-width:500px;margin:0 auto;padding:10px;}
.section-label{font-size:11px;color:var(--muted);margin:30px 0 10px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

.live-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;position:relative;}
.live-img{width:60px;height:60px;border-radius:6px;object-fit:cover;background:#000;}
.live-info{flex:1;min-width:0;}
.live-title{font-size:14px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.live-meta{font-size:10px;color:var(--muted);}
.coming-soon{color:var(--blue);font-family:serif;font-weight:bold;font-style:italic;margin-left:5px;}

/* 編集用タップエリアを明確に */
.edit-trigger{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--border);border-radius:50%;color:var(--accent);font-size:16px;cursor:pointer;border:none;}

/* モーダル */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:400px;padding:25px;border-radius:20px;max-height:85vh;overflow-y:auto;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:700;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:15px;outline:none;}
</style>
</head>
<body>

<header>
  <div class="header-title">1048 ADMIN MASTER</div>
  <div class="admin-toolbar">
    <button class="btn" onclick="openProfile()">👤 プロフィール編集</button>
    <button class="btn btn-primary" onclick="addNewLive()">➕ 追加</button>
    <button class="btn btn-export" onclick="openExport()">🚀 GitHub出力</button>
  </div>
</header>

<div class="profile-box" id="profileDisplay">
  <div class="profile-name" id="pDispName"></div>
  <div class="profile-desc" id="pDispDesc"></div>
</div>

<main id="liveListContainer"></main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h3 style="margin-bottom:20px;color:var(--accent);">実績の編集</h3>
    <input type="hidden" id="editYear"><input type="hidden" id="editIndex">
    <div class="form-group"><label>フライヤー画像URL</label><input type="text" id="lThumb"></div>
    <div class="form-group"><label>開催日</label><input type="date" id="lFullDate"></div>
    <div class="form-group"><label>イベント名</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式</label><input type="text" id="lFormat"></div>
    <div class="form-group" style="display:flex;gap:10px;align-items:center;padding:10px;background:var(--bg);border-radius:8px;">
      <input type="checkbox" id="lUpcoming" style="width:20px;height:20px;">
      <label style="margin:0;">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗... 表示</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn" onclick="closeModal('liveModal')" style="flex:1;">戻る</button>
      <button class="btn btn-primary" onclick="saveLive()" style="flex:2;">保存</button>
    </div>
    <button onclick="deleteLive()" style="width:100%;background:none;border:none;color:var(--muted);font-size:10px;margin-top:20px;text-decoration:underline;">実績を削除</button>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-content">
    <h3>プロフィール管理</h3>
    <div class="form-group"><label>名前</label><input type="text" id="pName"></div>
    <div class="form-group"><label>自己紹介</label><textarea id="pDesc" rows="5"></textarea></div>
    <div class="form-group"><label>Twitter URL</label><input type="text" id="pTwitter"></div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn" onclick="closeModal('profileModal')" style="flex:1;">戻る</button>
      <button class="btn btn-primary" onclick="saveProfile()" style="flex:2;">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3>全出力コード</h3>
    <textarea id="exportText" style="width:100%;height:300px;font-size:10px;background:#000;color:#22c55e;padding:10px;border-radius:10px;" readonly></textarea>
    <button class="btn btn-primary" onclick="copyCode()" style="width:100%;margin-top:10px;">📋 コピー</button>
    <button class="btn" onclick="closeModal('exportModal')" style="width:100%;margin-top:5px;">閉じる</button>
  </div>
</div>

<script>
// --- 全26公演 精査済みデータ ---
let SITE_DATA = {"profile":{"name":"1048ライブ運営/ツール販売","desc":"2012年~2020年まで歌い手として活動。2015年~現在に至るまで約100本のライブ主催と運営を担当しました。","twitter":"https://x.com/toshiyanman1227"},"lives":{"2023":[{"date":"11/23","fullDate":"2023-11-23","role":"運営","title":"Good Meat Good Meet","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/c4b261f0-6561-40a0-9a8d-5e0e0e29c9d6.jpeg"}],"2024":[{"date":"1/20","fullDate":"2024-01-20","role":"運営","title":"みんなでパジャマパーティ","format":"1部制インスト/配信有","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/8cb1c7dc-3f79-4df5-af6d-f75f5d7e1566.jpeg"},{"date":"3/2","fullDate":"2024-03-02","role":"運営","title":"謳歌〜ファンファーレ〜","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/16604dee-23b1-47b2-9d42-547c5d7e61c4.jpeg"},{"date":"4/29","fullDate":"2024-04-29","role":"運営","title":"CLOVER PLAYHOUSE","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/294471e2-4e8c-424b-95f7-c3cfa90a0126.png"},{"date":"6/1","fullDate":"2024-06-01","role":"運営","title":"GMGM -calm echoes day-","format":"アコースティック","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/14210640-10d5-4cec-b110-64dffdd6a52d.jpeg"},{"date":"8/17","fullDate":"2024-08-17","role":"主催","title":"Unison","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/ac1d6e3d-c7c5-4a05-92fc-88830c02860e.png"},{"date":"9/28","fullDate":"2024-09-28","role":"主催","title":"古-壱-","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/9ab3089d-6bcf-4cc7-8ac7-f861f94fc57a.jpeg"},{"date":"10/15","fullDate":"2024-10-15","role":"運営補佐","title":"SIGNAL","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/948543a9-5781-4347-8e23-896c56e83761.png"},{"date":"11/25","fullDate":"2024-11-25","role":"運営","title":"Good Meat Good Meet 2","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{"date":"12/15","fullDate":"2024-12-15","role":"運営","title":"Floralia -Camelia-","format":"1部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/5f95b4e5-d731-4f18-8eeb-96770ec967fa.jpeg"},{"date":"12/28","fullDate":"2024-12-28","role":"運営","title":"1048 Winter Live","format":"1部制バンド"}],"2025":[{"date":"1/25","fullDate":"2025-01-25","role":"運営","title":"みんなでパジャマパーティ 2","format":"2部制インスト","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/81341d32-7e8f-4f59-8a88-7a29de241666.jpeg"},{"date":"2/8","fullDate":"2025-02-08","role":"主催","title":"古-弐-","format":"2部制インスト/バンド","thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{"date":"4/26","fullDate":"2025-04-26","role":"運営","title":"CLOVER PLAYHOUSE 2","format":"2部制インスト"},{"date":"5/11","fullDate":"2025-05-11","role":"運営スタッフ","title":"＋α","format":"2部制インスト"},{"date":"5/17","fullDate":"2025-05-17","role":"主催","title":"Unison 2","format":"2部制インスト"},{"date":"6/21","fullDate":"2025-06-21","role":"運営","title":"Summer Live","format":"野外ライブ"},{"date":"8/23","fullDate":"2025-08-23","role":"運営スタッフ","title":"FLASH","format":"2部制インスト"},{"date":"10/12","fullDate":"2025-10-12","role":"主催","title":"みにしえ-壱-","format":"1部制インスト"},{"date":"11/15","fullDate":"2025-11-15","role":"運営","title":"Autumn Harmony","format":"1部制インスト"},{"date":"12/20","fullDate":"2025-12-20","role":"運営","title":"Bar Ecrin","format":"1部制インスト"}],"2026":[{"date":"1/31","fullDate":"2026-01-31","role":"主催","title":"古-参-","format":"2部制バンド"},{"date":"2/22","fullDate":"2026-02-22","role":"運営スタッフ","title":"DPMN","format":"2部制バンド"},{"date":"4/11","fullDate":"2026-04-11","role":"運営","title":"オトヲアビロ vol.1","format":"2部制バンド"},{"date":"5/16","fullDate":"2026-05-16","role":"主催","title":"Unison Final","format":"2部制インスト","upcoming":true,"thumb":"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/profile_links/buttons/e981f470-f417-4050-8021-f13e9b87946c.jpeg"},{"date":"10/17","fullDate":"2026-10-17","role":"主催","title":"古-終-","format":"2部制バンド","upcoming":true}]}};

const STORAGE_KEY = "1048_perfect_v1";
const saved = localStorage.getItem(STORAGE_KEY);
if(saved) SITE_DATA = JSON.parse(saved);
function saveToLocal(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(SITE_DATA)); }

function render() {
  const p = SITE_DATA.profile;
  document.getElementById('pDispName').innerText = p.name;
  document.getElementById('pDispDesc').innerText = p.desc;

  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);
  years.forEach(year => {
    container.innerHTML += `<div class="section-label">${year} ARCHIVE</div>`;
    SITE_DATA.lives[year].sort((a,b)=>new Date(b.fullDate) - new Date(a.fullDate)).forEach((l, idx) => {
      const card = document.createElement('div');
      card.className = 'live-card';
      card.innerHTML = `
        <img src="${l.thumb || ''}" class="live-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxIDEiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMzMzMiLz48L3N2Zz4='">
        <div class="live-info">
          <div class="live-title">${l.title}</div>
          <div class="live-meta">${l.date} | ${l.role}${l.upcoming?'<span class="coming-soon">𝙲𝚘𝚖𝚒𝚗𝚐 𝚜𝚘𝚘𝚗...</span>':''}</div>
        </div>
        <button class="edit-trigger" onclick="editLive('${year}', ${idx})">✎</button>
      `;
      container.appendChild(card);
    });
  });
}

function openProfile(){
  document.getElementById('pName').value = SITE_DATA.profile.name;
  document.getElementById('pDesc').value = SITE_DATA.profile.desc;
  document.getElementById('pTwitter').value = SITE_DATA.profile.twitter;
  document.getElementById('profileModal').classList.add('open');
}
function saveProfile(){
  SITE_DATA.profile.name = document.getElementById('pName').value;
  SITE_DATA.profile.desc = document.getElementById('pDesc').value;
  SITE_DATA.profile.twitter = document.getElementById('pTwitter').value;
  saveToLocal(); render(); closeModal('profileModal');
}

function editLive(year, idx){
  const l = SITE_DATA.lives[year][idx];
  document.getElementById('editYear').value = year;
  document.getElementById('editIndex').value = idx;
  document.getElementById('lTitle').value = l.title;
  document.getElementById('lFullDate').value = l.fullDate;
  document.getElementById('lRole').value = l.role;
  document.getElementById('lFormat').value = l.format || '';
  document.getElementById('lThumb').value = l.thumb || '';
  document.getElementById('lUpcoming').checked = !!l.upcoming;
  document.getElementById('liveModal').classList.add('open');
}

function saveLive(){
  const fDate = document.getElementById('lFullDate').value;
  if(!fDate) return;
  const d = new Date(fDate);
  const year = d.getFullYear().toString();
  const newItem = {
    date: `${d.getMonth()+1}/${d.getDate()}`, fullDate: fDate,
    role: document.getElementById('lRole').value, title: document.getElementById('lTitle').value,
    format: document.getElementById('lFormat').value, thumb: document.getElementById('lThumb').value,
    upcoming: document.getElementById('lUpcoming').checked
  };
  const oldYear = document.getElementById('editYear').value;
  const oldIdx = document.getElementById('editIndex').value;
  if(oldIdx !== '') SITE_DATA.lives[oldYear].splice(oldIdx, 1);
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  SITE_DATA.lives[year].push(newItem);
  saveToLocal(); render(); closeModal('liveModal');
}

function deleteLive(){
  if(!confirm('削除しますか？')) return;
  const y = document.getElementById('editYear').value;
  const i = document.getElementById('editIndex').value;
  SITE_DATA.lives[y].splice(i, 1);
  saveToLocal(); render(); closeModal('liveModal');
}

function addNewLive(){
  document.getElementById('editYear').value = '';
  document.getElementById('editIndex').value = '';
  document.getElementById('lFullDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('lTitle').value = '';
  document.getElementById('lThumb').value = '';
  document.getElementById('lUpcoming').checked = false;
  document.getElementById('liveModal').classList.add('open');
}

function openExport(){
  document.getElementById('exportText').value = document.documentElement.outerHTML;
  document.getElementById('exportModal').classList.add('open');
}
function copyCode(){
  document.getElementById('exportText').select();
  document.execCommand('copy');
  alert("コピー完了！GitHubのindex.htmlに貼り付けてください。");
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

render();
</script>
</body>
</html>
