<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 管理画面 PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6a8a;--gold:#c9a84c;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:sticky;top:0;z-index:10;padding:20px 18px;text-align:center;border-bottom:1px solid var(--border);background:rgba(13,13,26,0.8);backdrop-filter:blur(10px);}
.header-name{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:800;color:var(--accent);margin-bottom:12px;}
.admin-toolbar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}

/* ボタン共通 */
.btn{padding:10px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:0.2s;text-decoration:none;touch-action:manipulation;}
.btn:active{transform:scale(0.96);opacity:0.8;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.success{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.btn.small{padding:5px 8px;font-size:11px;min-width:auto;}

main{padding:20px 14px 100px;max-width:800px;margin:0 auto;}
.section-title{font-size:13px;color:var(--muted);margin:30px 0 12px;display:flex;align-items:center;gap:10px;font-weight:500;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.live-list{display:grid;gap:10px;}
.live-item{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:10px;display:grid;grid-template-columns:50px 1fr auto;gap:12px;align-items:center;}
.live-thumb-preview{width:50px;height:50px;background:var(--surface2);border-radius:4px;object-fit:cover;pointer-events:none;}
.live-info{pointer-events:none; min-width:0;}
.live-info-title{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.live-info-sub{font-size:10px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
.item-actions{display:flex;flex-direction:column;gap:5px;}

/* モーダル */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(5px);}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);width:100%;max-width:500px;padding:24px;border-radius:12px;max-height:90vh;overflow-y:auto;}
.modal-h2{font-size:16px;margin-bottom:20px;color:var(--accent);display:flex;justify-content:space-between;align-items:center;}

.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;}
.form-group input, .form-group textarea, .form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:6px;font-family:inherit;font-size:14px;outline:none;}
.image-upload-area{border:2px dashed var(--border);padding:20px;text-align:center;border-radius:8px;margin-bottom:10px;cursor:pointer;}
.image-preview-large{width:100%;height:150px;object-fit:contain;background:#000;margin-top:10px;border-radius:6px;display:none;}
.image-preview-large.active{display:block;}

.tool-edit-card{background:var(--surface2);padding:12px;border-radius:8px;margin-bottom:12px;border:1px solid var(--border);position:relative;}
.modal-btns{display:flex;gap:10px;margin-top:25px;position:sticky;bottom:0;background:var(--surface);padding-top:10px;}
#exportText{width:100%;height:300px;background:#000;color:#0f0;font-family:monospace;font-size:10px;padding:12px;border-radius:6px;border:none;margin-bottom:15px;}
</style>
</head>
<body>

<header>
  <div class="header-name">1048 Web Administration</div>
  <div class="admin-toolbar">
    <button class="btn" onclick="openProfileModal()">👤 プロフィール</button>
    <button class="btn primary" onclick="openLiveModal()">➕ 新規追加</button>
    <button class="btn success" id="btnExport">🚀 コード出力</button>
  </div>
</header>

<main id="liveListContainer"></main>

<div class="modal" id="liveModal">
  <div class="modal-content">
    <h2 class="modal-h2" id="liveModalTitle">実績の登録</h2>
    <input type="hidden" id="editYear">
    <input type="hidden" id="editIndex">
    <div class="form-group">
      <label>サムネイル (タップしてアップロード)</label>
      <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
        <span style="font-size:12px;">📁 画像を選択</span>
        <input type="file" id="fileInput" hidden accept="image/*">
        <img id="imgPreview" class="image-preview-large">
      </div>
      <input type="text" id="lThumb" placeholder="またはURLを入力">
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div class="form-group"><label>開催年</label><input type="number" id="lYear" value="2026"></div>
      <div class="form-group"><label>日付 (MM/DD)</label><input type="text" id="lDate"></div>
    </div>
    <div class="form-group"><label>イベント名</label><input type="text" id="lTitle"></div>
    <div class="form-group"><label>役割</label><select id="lRole"><option value="主催">主催</option><option value="運営">運営</option><option value="運営補佐">運営補佐</option><option value="運営スタッフ">運営スタッフ</option></select></div>
    <div class="form-group"><label>形式</label><input type="text" id="lFormat"></div>
    <div class="form-group"><label>告知リンク</label><input type="text" id="lLink"></div>
    <div class="form-group" style="display:flex;gap:10px;align-items:center;background:var(--surface2);padding:10px;border-radius:6px;">
      <input type="checkbox" id="lUpcoming" style="width:20px;height:20px;">
      <label style="margin:0;">今後開催として表示</label>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeLiveModal()" style="flex:1;">戻る</button>
      <button class="btn primary" id="btnSaveLive" style="flex:2;">保存する</button>
    </div>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-content">
    <h2 class="modal-h2">プロフィール設定</h2>
    <div class="form-group"><label>名前</label><input type="text" id="hName"></div>
    <div class="form-group"><label>肩書き</label><input type="text" id="hSub"></div>
    <div class="form-group"><label>自己紹介</label><textarea id="hDesc" style="height:100px;"></textarea></div>
    <div class="form-group"><label>Twitter URL</label><input type="text" id="hTwitter"></div>
    
    <h2 class="modal-h2" style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px;">
      ツール販売設定
      <button class="btn small primary" onclick="addToolField()">＋ 追加</button>
    </h2>
    <div id="toolInputsContainer"></div>

    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('profileModal').classList.remove('open')" style="flex:1;">戻る</button>
      <button class="btn primary" id="btnSaveProfile" style="flex:2;">保存する</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content" style="max-width:700px;">
    <h2 class="modal-h2">出力コード</h2>
    <textarea id="exportText" readonly></textarea>
    <button class="btn primary" id="copyBtn" style="width:100%; padding:15px; font-weight:bold;">📋 コピーする</button>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="document.getElementById('exportModal').classList.remove('open')">閉じる</button>
  </div>
</div>

const stored = localStorage.getItem('1048_admin_v4');
if(stored) SITE_DATA = JSON.parse(stored);

function saveAll() {
  localStorage.setItem('1048_admin_v4', JSON.stringify(SITE_DATA));

// --- ライブ管理 ---
function renderLiveList() {
  const container = document.getElementById('liveListContainer');
  container.innerHTML = '';
  const years = Object.keys(SITE_DATA.lives).sort((a,b)=>b-a);
  
  years.forEach(year => {
    container.innerHTML += `<div class="section-title">${year}年 実績</div><div class="live-list" id="list-${year}"></div>`;
    const list = document.getElementById(`list-${year}`);
    
    SITE_DATA.lives[year].forEach((live, idx) => {
      const item = document.createElement('div');
      item.className = 'live-item';
      item.innerHTML = `
        <img src="${live.thumb || ''}" class="live-thumb-preview">
        <div class="live-info">
          <div class="live-info-title">${live.title || '無題'}</div>
          <div class="live-info-sub"><span>${live.date}</span><span>${live.role}</span>${live.upcoming?'<span style="color:var(--accent2)">★予約</span>':''}</div>
        </div>
        <div class="item-actions">
           <button class="btn small primary edit-trigger" data-year="${year}" data-idx="${idx}">編集</button>
           <button class="btn small delete-trigger" data-year="${year}" data-idx="${idx}" style="color:var(--accent2); border:none; background:none;">削除</button>
        </div>
      `;
      list.appendChild(item);
    });
  });

  // イベントリスナーの一括登録 (スマホ反応改善)
  document.querySelectorAll('.edit-trigger').forEach(el => {
    const editFn = () => editLive(el.dataset.year, el.dataset.idx);
    el.addEventListener('click', editFn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); editFn(); });
  });
  
  document.querySelectorAll('.delete-trigger').forEach(el => {
    const delFn = () => deleteLive(el.dataset.year, el.dataset.idx);
    el.addEventListener('click', delFn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); delFn(); });
  });
}

function openLiveModal() {
  document.getElementById('liveModalTitle').textContent = '実績の追加';
  document.getElementById('editYear').value = '';
  document.getElementById('editIndex').value = '';
  document.getElementById('imgPreview').classList.remove('active');
  ['lThumb','lTitle','lDate','lFormat','lLink'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lUpcoming').checked = false;
  document.getElementById('liveModal').classList.add('open');
}

function editLive(year, idx) {
  const live = SITE_DATA.lives[year][idx];
  document.getElementById('liveModalTitle').textContent = '実績の編集';
  document.getElementById('editYear').value = year;
  document.getElementById('editIndex').value = idx;
  document.getElementById('lYear').value = year;
  document.getElementById('lDate').value = live.date;
  document.getElementById('lTitle').value = live.title;
  document.getElementById('lRole').value = live.role;
  document.getElementById('lFormat').value = live.format;
  document.getElementById('lLink').value = live.link;
  document.getElementById('lThumb').value = live.thumb;
  document.getElementById('lUpcoming').checked = !!live.upcoming;
  
  const img = document.getElementById('imgPreview');
  if(live.thumb) { img.src = live.thumb; img.classList.add('active'); }
  else { img.classList.remove('active'); }
  document.getElementById('liveModal').classList.add('open');
}

document.getElementById('btnSaveLive').addEventListener('click', saveLiveHandler);
document.getElementById('btnSaveLive').addEventListener('touchend', (e) => { e.preventDefault(); saveLiveHandler(); });

function saveLiveHandler() {
  const year = document.getElementById('lYear').value;
  const oldYear = document.getElementById('editYear').value;
  const oldIdx = document.getElementById('editIndex').value;

  const data = {
    date: document.getElementById('lDate').value,
    role: document.getElementById('lRole').value,
    title: document.getElementById('lTitle').value,
    organizer: "",
    format: document.getElementById('lFormat').value,
    link: document.getElementById('lLink').value,
    thumb: document.getElementById('lThumb').value,
    upcoming: document.getElementById('lUpcoming').checked
  };

  if(oldIdx !== '') {
    SITE_DATA.lives[oldYear].splice(oldIdx, 1);
    if(SITE_DATA.lives[oldYear].length === 0) delete SITE_DATA.lives[oldYear];
  }
  if(!SITE_DATA.lives[year]) SITE_DATA.lives[year] = [];
  SITE_DATA.lives[year].unshift(data);
  
  saveAll(); renderLiveList(); closeLiveModal();
}

function deleteLive(year, idx) {
  if(confirm('この実績を削除しますか？')) {
    SITE_DATA.lives[year].splice(idx, 1);
    if(SITE_DATA.lives[year].length === 0) delete SITE_DATA.lives[year];
    saveAll(); renderLiveList();
  }
}

function closeLiveModal() { document.getElementById('liveModal').classList.remove('open'); }

// --- ツール管理 ---
function addToolField(tool = {icon:'', name:'', note:'', url:''}) {
  const container = document.getElementById('toolInputsContainer');
  const div = document.createElement('div');
  div.className = 'tool-edit-card';
  div.innerHTML = `
    <div style="display:grid; grid-template-columns:50px 1fr 1fr; gap:8px; margin-bottom:8px;">
      <input type="text" placeholder="🎨" class="t-icon" value="${tool.icon}">
      <input type="text" placeholder="ツール名" class="t-name" value="${tool.name}">
      <input type="text" placeholder="説明" class="t-note" value="${tool.note}">
    </div>
    <input type="text" placeholder="BOOTH URL" class="t-url" value="${tool.url}">
    <button class="btn small" onclick="this.parentElement.remove()" style="position:absolute; top:5px; right:5px; color:var(--accent2); border:none; background:none;">✕</button>
  `;
  container.appendChild(div);
}

function openProfileModal() {
  const p = SITE_DATA.profile;
  document.getElementById('hName').value = p.name;
  document.getElementById('hSub').value = p.sub;
  document.getElementById('hDesc').value = p.desc;
  document.getElementById('hTwitter').value = p.twitter;
  const container = document.getElementById('toolInputsContainer');
  container.innerHTML = '';
  if(p.tools && p.tools.length > 0) p.tools.forEach(t => addToolField(t));
  else addToolField();
  document.getElementById('profileModal').classList.add('open');
}

document.getElementById('btnSaveProfile').addEventListener('click', saveProfileHandler);
function saveProfileHandler() {
  const p = SITE_DATA.profile;
  p.name = document.getElementById('hName').value;
  p.sub = document.getElementById('hSub').value;
  p.desc = document.getElementById('hDesc').value;
  p.twitter = document.getElementById('hTwitter').value;
  const toolCards = document.querySelectorAll('.tool-edit-card');
  p.tools = [];
  toolCards.forEach(card => {
    const name = card.querySelector('.t-name').value;
    if(name) p.tools.push({
      icon: card.querySelector('.t-icon').value,
      name: name,
      note: card.querySelector('.t-note').value,
      url: card.querySelector('.t-url').value
    });
  });
  saveAll();
  document.getElementById('profileModal').classList.remove('open');
}

// --- その他 ---
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('lThumb').value = ev.target.result;
    const img = document.getElementById('imgPreview');
    img.src = ev.target.result; img.classList.add('active');
  };
  reader.readAsDataURL(file);
});

document.getElementById('btnExport').addEventListener('click', () => {
  document.getElementById('exportText').value = `const SITE_DATA = ${JSON.stringify(SITE_DATA)};`;
  document.getElementById('exportModal').classList.add('open');
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const ta = document.getElementById('exportText');
  ta.select();
  document.execCommand('copy');
  alert('コピーしました！');
});

renderLiveList();
</script>
</body>
</html>
