<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1048 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6a8a;--gold:#c9a84c;--text:#e8e6f0;--muted:#6b6880;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 0%,rgba(124,106,255,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(255,106,138,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* ADMIN HEADER */
.admin-bar{position:relative;z-index:10;background:rgba(124,106,255,.12);border-bottom:1px solid rgba(124,106,255,.25);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.admin-bar-title{font-size:11px;letter-spacing:.2em;color:var(--accent);font-weight:500;}
.admin-bar-btns{display:flex;gap:8px;}
.abtn{display:flex;align-items:center;gap:4px;padding:7px 12px;font-size:11px;border:1px solid var(--border);color:var(--text);background:var(--surface2);cursor:pointer;border-radius:3px;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.abtn.export{border-color:var(--gold);color:var(--gold);}
.abtn.profile-btn{border-color:var(--accent2);color:var(--accent2);}
.abtn:active{opacity:.65;}

/* HEADER PREVIEW */
header{position:relative;z-index:1;padding:32px 18px 20px;text-align:center;border-bottom:1px solid var(--border);}
.avatar-wrap{width:80px;height:80px;margin:0 auto 14px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;box-shadow:0 0 28px rgba(124,106,255,.35);}
.avatar-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.header-name{font-family:'Shippori Mincho',serif;font-size:40px;font-weight:800;letter-spacing:.1em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.header-sub{font-size:10px;letter-spacing:.35em;color:var(--muted);margin-bottom:12px;text-transform:uppercase;}
.header-desc{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px;white-space:pre-wrap;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.role-item{background:var(--surface);border:1px solid var(--border);padding:9px 11px;font-size:11px;line-height:1.55;text-align:left;}
.role-name{color:var(--accent);font-weight:700;display:block;margin-bottom:1px;}
.role-desc{color:var(--muted);font-size:10px;}
.header-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.hbtn{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 6px;font-size:12px;letter-spacing:.06em;text-decoration:none;border:1px solid var(--border);color:var(--text);background:var(--surface);border-radius:2px;white-space:nowrap;}
.hbtn.contact{border-color:var(--accent);color:var(--accent);}
.hbtn.booth{border-color:var(--accent2);color:var(--accent2);}

/* STATS */
.stats-row{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat-box{background:var(--surface);padding:14px 8px;text-align:center;}
.stat-n{font-family:'Shippori Mincho',serif;font-size:26px;color:var(--accent);line-height:1;display:block;}
.stat-l{font-size:9px;color:var(--muted);letter-spacing:.2em;margin-top:3px;display:block;}

/* MAIN */
main{position:relative;z-index:1;padding:0 14px 110px;}

/* YEAR */
.year-section{margin-top:28px;}
.year-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:6px 0;}
.year-num{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:800;color:var(--accent);line-height:1;}
.year-count{font-size:10px;color:var(--muted);letter-spacing:.15em;}
.year-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* CARD */
.live-card{display:grid;grid-template-columns:64px 1fr auto;background:var(--surface);border:1px solid rgba(124,106,255,.25);border-style:dashed;margin-bottom:8px;overflow:hidden;border-radius:2px;cursor:pointer;transition:border-color .2s,opacity .2s;}
.live-card:active{opacity:.7;}
.live-card.upcoming{border-color:rgba(96,165,250,.35);}
.card-thumb-wrap{width:64px;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;min-height:68px;}
.card-thumb{width:64px;height:100%;min-height:68px;object-fit:cover;display:block;filter:saturate(.7);}
.card-thumb-ph{font-family:'Shippori Mincho',serif;font-size:18px;color:rgba(124,106,255,.3);}
.card-body{padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-date{font-size:11px;color:var(--gold);letter-spacing:.06em;white-space:nowrap;}
.role-badge{font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:.06em;font-weight:700;white-space:nowrap;}
.role-主催{background:rgba(124,106,255,.2);color:#a89fff;border:1px solid rgba(124,106,255,.3);}
.role-運営{background:rgba(74,222,128,.15);color:#86efac;border:1px solid rgba(74,222,128,.3);}
.role-運営補佐{background:rgba(251,146,60,.15);color:#fdba74;border:1px solid rgba(251,146,60,.3);}
.role-運営スタッフ{background:rgba(96,165,250,.15);color:#93c5fd;border:1px solid rgba(96,165,250,.3);}
.upcoming-badge{font-size:9px;padding:2px 6px;background:rgba(96,165,250,.15);color:#93c5fd;border:1px solid rgba(96,165,250,.4);letter-spacing:.1em;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-title{font-size:13px;font-weight:500;color:var(--text);letter-spacing:.04em;line-height:1.35;word-break:break-all;}
.card-meta{font-size:10px;color:var(--muted);}
.card-format{font-size:10px;color:rgba(124,106,255,.65);}
.card-edit-icon{display:flex;align-items:center;justify-content:center;padding:0 12px;color:rgba(124,106,255,.5);font-size:14px;flex-shrink:0;}

/* ADD BUTTON */
.add-year-btn{width:100%;padding:11px;background:rgba(124,106,255,.06);border:1px dashed rgba(124,106,255,.25);color:rgba(124,106,255,.6);font-size:12px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.1em;cursor:pointer;border-radius:2px;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-year-btn:active{opacity:.6;}

/* FAB */
.fab-wrap{position:fixed;bottom:20px;right:16px;z-index:200;}
.fab{width:54px;height:54px;border-radius:50%;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.4);font-size:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));}
.fab:active{transform:scale(.9);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-bottom:none;width:100%;max-width:520px;max-height:93vh;overflow-y:auto;padding:20px 18px 44px;border-radius:14px 14px 0 0;position:relative;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:800;margin-bottom:18px;color:var(--accent);}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:13px;}
.form-label{font-size:10px;letter-spacing:.2em;color:var(--muted);display:block;margin-bottom:5px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 12px;font-size:16px;font-family:'Noto Sans JP',sans-serif;outline:none;border-radius:2px;transition:border-color .2s;-webkit-appearance:none;}
.form-textarea{min-height:76px;resize:vertical;line-height:1.7;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-select option{background:var(--surface2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:15px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.1em;cursor:pointer;margin-top:8px;border-radius:4px;}
.btn-submit:active{opacity:.75;}
.btn-delete{width:100%;padding:12px;background:rgba(255,70,70,.1);border:1px solid rgba(255,70,70,.3);color:#ff8080;font-size:13px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.1em;cursor:pointer;border-radius:4px;margin-top:8px;}
.img-preview-wrap{position:relative;width:80px;height:80px;margin-bottom:8px;}
.img-preview{width:80px;height:80px;object-fit:cover;border:1px solid var(--border);border-radius:4px;display:block;}
.img-clear-btn{position:absolute;top:-7px;right:-7px;background:#ff4040;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.img-upload-label{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:var(--surface2);border:1px dashed var(--border);color:var(--muted);font-size:13px;cursor:pointer;border-radius:4px;margin-bottom:8px;}
.img-upload-label:active{opacity:.7;}
.avatar-edit-row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.avatar-preview-sm{width:60px;height:60px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;flex-shrink:0;}
.avatar-preview-sm img{width:100%;height:100%;object-fit:cover;}

/* EXPORT モーダル */
#exportModal .modal-title{color:var(--gold);}
.export-textarea{width:100%;background:#0a0a00;border:1px solid var(--gold);color:#e8d08a;padding:12px;font-size:11px;font-family:monospace;min-height:160px;border-radius:4px;resize:none;outline:none;margin-bottom:12px;line-height:1.5;}
.export-steps{background:var(--surface2);border:1px solid var(--border);padding:14px;border-radius:4px;margin-bottom:14px;}
.export-steps p{font-size:11px;color:var(--muted);line-height:2;letter-spacing:.03em;}
.export-steps strong{color:var(--text);}
.copy-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),#e8a020);border:none;color:#000;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:700;letter-spacing:.1em;cursor:pointer;border-radius:4px;}
.copy-btn:active{opacity:.75;}

footer{position:relative;z-index:1;text-align:center;padding:20px;border-top:1px solid var(--border);margin-top:28px;}
footer p{font-size:10px;color:var(--muted);}
footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>

<!-- 管理バー -->
<div class="admin-bar">
  <span class="admin-bar-title">⚙ 管理画面</span>
  <div class="admin-bar-btns">
    <button class="abtn profile-btn" id="btnProfile">👤 プロフィール</button>
    <button class="abtn export" id="btnExport">📤 書き出し</button>
  </div>
</div>

<!-- ヘッダープレビュー -->
<header>
  <div class="avatar-wrap"><img id="avatarImg" src="" alt="1048"></div>
  <h1 class="header-name" id="dispName"></h1>
  <p class="header-sub" id="dispSub"></p>
  <p class="header-desc" id="dispDesc"></p>
  <div class="role-grid" id="dispRoleGrid"></div>
  <div class="header-btns">
    <a id="dispContact" href="#" class="hbtn contact">✉ お問い合わせ</a>
    <a id="dispBooth" href="#" class="hbtn booth" target="_blank">🛒 BOOTH</a>
    <a id="dispTwitter" href="#" class="hbtn" target="_blank">𝕏 Twitter</a>
  </div>
</header>

<div class="stats-row">
  <div class="stat-box"><span class="stat-n" id="sTotal">0</span><span class="stat-l">総制作本数</span></div>
  <div class="stat-box"><span class="stat-n" id="sOwn">0</span><span class="stat-l">主催</span></div>
  <div class="stat-box"><span class="stat-n" id="sOps">0</span><span class="stat-l">運営</span></div>
</div>

<main id="mainContent"></main>

<footer><p>管理画面 — <a href="../">公開ページを見る</a></p></footer>

<!-- FAB 追加 -->
<div class="fab-wrap">
  <button class="fab" id="fabAdd" title="実績を追加">＋</button>
</div>

<!-- ライブ追加/編集モーダル -->
<div class="modal-bg" id="liveModal">
  <div class="modal">
    <button class="modal-close" id="liveModalClose">✕</button>
    <div class="modal-title" id="liveModalTitle">📅 実績を追加</div>
    <input type="hidden" id="fEditYear">
    <input type="hidden" id="fEditIdx">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" id="fDate" type="text" placeholder="例: 8/10">
      </div>
      <div class="form-group">
        <label class="form-label">年</label>
        <select class="form-select" id="fYear">
          <option value="2027">2027年</option>
          <option value="2026" selected>2026年</option>
          <option value="2025">2025年</option>
          <option value="2024">2024年</option>
          <option value="2023">2023年</option>
          <option value="2022">2022年</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">役割</label>
      <select class="form-select" id="fRole">
        <option value="主催">主催</option>
        <option value="運営">運営</option>
        <option value="運営補佐">運営補佐</option>
        <option value="運営スタッフ">運営スタッフ</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ライブ名 *</label>
      <input class="form-input" id="fTitle" type="text" placeholder="例: 古-参-">
    </div>
    <div class="form-group">
      <label class="form-label">主催者（自分以外の場合）</label>
      <input class="form-input" id="fOrganizer" type="text" placeholder="例: 主催：〇〇様">
    </div>
    <div class="form-group">
      <label class="form-label">形式</label>
      <input class="form-input" id="fFormat" type="text" placeholder="例: 2部制インスト/バンド">
    </div>
    <div class="form-group">
      <label class="form-label">Twitter/X リンク</label>
      <input class="form-input" id="fLink" type="text" placeholder="https://twitter.com/...">
    </div>
    <div class="form-group">
      <label class="form-label">サムネ画像</label>
      <div id="fThumbPreviewWrap" style="display:none;">
        <div class="img-preview-wrap">
          <img id="fThumbPreview" class="img-preview" src="" alt="">
          <button class="img-clear-btn" id="fThumbClear">✕</button>
        </div>
      </div>
      <label class="img-upload-label">📷 画像をアップロード<input type="file" id="fThumbFile" accept="image/*" style="display:none;"></label>
      <input class="form-input" id="fThumbUrl" type="text" placeholder="または画像URLを貼り付け">
    </div>
    <div class="form-group">
      <label class="form-label">ステータス</label>
      <select class="form-select" id="fUpcoming">
        <option value="0">過去のライブ</option>
        <option value="1">開催予定（UPCOMING）</option>
      </select>
    </div>
    <button class="btn-submit" id="fSubmit">保存する</button>
    <button class="btn-delete" id="fDelete" style="display:none;">🗑 この実績を削除する</button>
  </div>
</div>

<!-- プロフィール編集モーダル -->
<div class="modal-bg" id="profileModal">
  <div class="modal">
    <button class="modal-close" id="profileModalClose">✕</button>
    <div class="modal-title" style="color:var(--accent2);">👤 プロフィール編集</div>
    <div class="form-group">
      <label class="form-label">アイコン画像</label>
      <div class="avatar-edit-row">
        <div class="avatar-preview-sm"><img id="hAvatarPreview" src="" alt=""></div>
        <label class="img-upload-label" style="margin:0;">📷 変更<input type="file" id="hAvatarFile" accept="image/*" style="display:none;"></label>
      </div>
      <input class="form-input" id="hAvatarUrl" type="text" placeholder="または画像URLを貼り付け" style="margin-top:8px;">
    </div>
    <div class="form-group"><label class="form-label">名前</label><input class="form-input" id="hName" type="text"></div>
    <div class="form-group"><label class="form-label">サブタイトル（英字）</label><input class="form-input" id="hSub" type="text"></div>
    <div class="form-group"><label class="form-label">自己紹介文</label><textarea class="form-textarea" id="hDesc"></textarea></div>
    <div class="form-group"><label class="form-label">【主催】の説明</label><input class="form-input" id="hRole1" type="text"></div>
    <div class="form-group"><label class="form-label">【運営】の説明</label><input class="form-input" id="hRole2" type="text"></div>
    <div class="form-group"><label class="form-label">【運営補佐】の説明</label><input class="form-input" id="hRole3" type="text"></div>
    <div class="form-group"><label class="form-label">【運営スタッフ】の説明</label><input class="form-input" id="hRole4" type="text"></div>
    <div class="form-group"><label class="form-label">お問い合わせ（メールアドレス）</label><input class="form-input" id="hContact" type="text" placeholder="xxx@example.com"></div>
    <div class="form-group"><label class="form-label">BOOTH URL</label><input class="form-input" id="hBooth" type="text"></div>
    <div class="form-group"><label class="form-label">Twitter/X URL</label><input class="form-input" id="hTwitter" type="text"></div>
    <button class="btn-submit" id="hSubmit" style="background:linear-gradient(135deg,var(--accent2),var(--accent));">保存する</button>
  </div>
</div>

<!-- エクスポートモーダル -->
<div class="modal-bg" id="exportModal">
  <div class="modal">
    <button class="modal-close" id="exportModalClose">✕</button>
    <div class="modal-title">📤 公開ページに反映する</div>
    <div class="export-steps">
      <p><strong>① </strong>下のコードをコピー</p>
      <p><strong>② </strong>公開用の <strong>index.html</strong> をメモ帳などで開く</p>
      <p><strong>③ </strong><strong>SITE_DATA = </strong>から始まる行を丸ごと置き換えて上書き保存</p>
      <p><strong>④ </strong>GitHubにアップロードして完了！</p>
    </div>
    <textarea class="export-textarea" id="exportText" readonly></textarea>
    <button class="copy-btn" id="copyBtn">📋 コピーする</button>
  </div>
</div>

const DEF_PROFILE={avatar:"https://prd.resource-api.lit.link/images/creator/b1410259-7a64-4f70-a926-c804ecc40caa/fa63f601-cce9-49d0-a822-e24829268e85.jpg",name:"1048",sub:"Live Event Producer",desc:"ライブ主催・運営のお手伝いをしています。\n2015年から主催業務を開始。赤字にならないような予算管理もお気軽にご相談ください。",role1:"準備〜当日終了まで全て",role2:"ライブハウス予約/予算管理/当日進行",role3:"準備サポート・当日進行全般",role4:"当日スタッフリーダー",contact:"toshiya1227@live.jp",booth:"https://1048bp.booth.pm/",twitter:"https://x.com/info_inishie"};

nk/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/8cb1c7dc-3f79-4df5-af6d-f75f5d7e1566.jpeg"},{date:"3/2",role:"運営",title:"謳歌〜ファンファーレ〜",organizer:"主催：のっつ様",format:"1部制インスト",link:"",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/16604dee-23b1-47b2-9d42-547c5d7e61c4.jpeg"},{date:"4/29",role:"運営",title:"CLOVER PLAYHOUSE",organizer:"主催：あるま様",format:"1部制インスト",link:"https://twitter.com/clovers_info",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/294471e2-4e8c-424b-95f7-c3cfa90a0126.png"},{date:"6/1",role:"運営",title:"GMGM -calm echoes day-",organizer:"主催：mira様",format:"1部制インスト/アコースティック",link:"https://twitter.com/gmgm_2023",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/14210640-10d5-4cec-b110-64dffdd6a52d.jpeg"},{date:"8/17",role:"主催",title:"Unison",organizer:"",format:"1部制インスト",link:"https://twitter.com/liveunison_info",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/ac1d6e3d-c7c5-4a05-92fc-88830c02860e.png"},{date:"9/28",role:"主催",title:"古-壱-",organizer:"",format:"2部制インスト",link:"https://twitter.com/info_inishie",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/9ab3089d-6bcf-4cc7-8ac7-f861f94fc57a.jpeg"},{date:"10/15",role:"運営補佐",title:"SIGNAL",organizer:"主催：Ampel様",format:"1部制インスト/配信有",link:"https://twitter.com/Ampelfcy_SIGNAL",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/948543a9-5781-4347-8e23-896c56e83761.png"},{date:"11/25",role:"運営",title:"Good Meat Good Meet 2",organizer:"主催：mira様",format:"2部制インスト/配信有",link:"https://twitter.com/gmgm_2023",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/b0c7ca9b-290e-4ad0-995f-fb26d87b34e8.jpeg"},{date:"12/15",role:"運営",title:"Floralia -Camelia-",organizer:"主催：紡様",format:"1部制インスト",link:"https://twitter.com/Floralia_sg",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/5f95b4e5-d731-4f18-8eeb-96770ec967fa.jpeg"}],"2023":[{date:"11/23",role:"運営",title:"Good Meat Good Meet",organizer:"主催：mira様",format:"2部制インスト",link:"https://twitter.com/gmgm_2023",thumb:"https://prd.resource-api.lit.link/images/creators/76150ddb-9865-485a-9dcf-a7dc3b02b767/c4b261f0-6561-40a0-9a8d-5e0e0e29c9d6.jpeg"}]};

function loadLives(){try{const s=localStorage.getItem('1048_lives');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEF_LIVES));}catch(e){return JSON.parse(JSON.stringify(DEF_LIVES));}}
function saveLives(d){try{localStorage.setItem('1048_lives',JSON.stringify(d));}catch(e){}}
function loadProfile(){try{const s=localStorage.getItem('1048_profile');return s?Object.assign({},DEF_PROFILE,JSON.parse(s)):Object.assign({},DEF_PROFILE);}catch(e){return Object.assign({},DEF_PROFILE);}}
function saveProfile(p){try{localStorage.setItem('1048_profile',JSON.stringify(p));}catch(e){}}
function fileToB64(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let liveData=loadLives(), profile=loadProfile();

/* プロフィール描画 */
function renderProfile(){
  document.getElementById('avatarImg').src=profile.avatar;
  document.getElementById('dispName').textContent=profile.name;
  document.getElementById('dispSub').textContent=profile.sub;
  document.getElementById('dispDesc').textContent=profile.desc;
  document.getElementById('dispRoleGrid').innerHTML=`<div class="role-item"><span class="role-name">【主催】</span><span class="role-desc">${esc(profile.role1)}</span></div><div class="role-item"><span class="role-name">【運営】</span><span class="role-desc">${esc(profile.role2)}</span></div><div class="role-item"><span class="role-name">【運営補佐】</span><span class="role-desc">${esc(profile.role3)}</span></div><div class="role-item"><span class="role-name">【運営スタッフ】</span><span class="role-desc">${esc(profile.role4)}</span></div>`;
  document.getElementById('dispContact').href='mailto:'+profile.contact;
  document.getElementById('dispBooth').href=profile.booth;
  document.getElementById('dispTwitter').href=profile.twitter;
}

/* ライブ一覧 */
function renderAll(){
  const main=document.getElementById('mainContent');main.innerHTML='';
  const years=Object.keys(liveData).sort((a,b)=>b-a);
  let total=0,own=0,ops=0;
  years.forEach(year=>{
    const lives=liveData[year]||[];
    total+=lives.length;lives.forEach(l=>{if(l.role==='主催')own++;else ops++;});
    const upCount=lives.filter(l=>l.upcoming).length;
    const sec=document.createElement('div');sec.className='year-section';sec.dataset.year=year;
    sec.innerHTML=`<div class="year-header"><span class="year-num">${year}</span><span class="year-count">${lives.length-upCount}本${upCount>0?' + '+upCount+'予定':''}</span><div class="year-line"></div></div><div class="year-body"></div>`;
    main.appendChild(sec);
    const body=sec.querySelector('.year-body');
    lives.forEach((live,idx)=>{
      const div=document.createElement('div');
      div.className='live-card'+(live.upcoming?' upcoming':'');
      div.innerHTML=`<div class="card-thumb-wrap">${live.thumb?`<img class="card-thumb" src="${esc(live.thumb)}" alt="" onerror="this.parentNode.innerHTML='<div class=card-thumb-ph>${live.role==='主催'?'主':'運'}</div>'">`:`<div class="card-thumb-ph">${live.role==='主催'?'主':'運'}</div>`}</div><div class="card-body"><div class="card-top"><span class="card-date">${esc(live.date)}</span><span class="role-badge role-${live.role}">${live.role}</span>${live.upcoming?'<span class="upcoming-badge">UPCOMING</span>':''}</div><div class="card-title">${esc(live.title)}</div>${live.organizer?`<div class="card-meta">${esc(live.organizer)}</div>`:''}${live.format?`<div class="card-format">${esc(live.format)}</div>`:''}</div><div class="card-edit-icon">✏️</div>`;
      div.addEventListener('click',()=>openLiveEdit(year,idx));
      body.appendChild(div);
    });
    // 年内追加ボタン
    const addBtn=document.createElement('button');
    addBtn.className='add-year-btn';
    addBtn.innerHTML=`＋ ${year}年の実績を追加`;
    addBtn.addEventListener('click',()=>openLiveAdd(year));
    body.appendChild(addBtn);
  });
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sOwn').textContent=own;
  document.getElementById('sOps').textContent=ops;
}

/* ライブモーダル */
let thumbB64='';
function openLiveAdd(year='2026'){
  thumbB64='';
  document.getElementById('liveModalTitle').textContent='📅 実績を追加';
  document.getElementById('fEditYear').value='';document.getElementById('fEditIdx').value='';
  ['fDate','fTitle','fOrganizer','fFormat','fLink','fThumbUrl'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fYear').value=year;document.getElementById('fRole').value='主催';
  document.getElementById('fUpcoming').value='0';
  document.getElementById('fThumbPreviewWrap').style.display='none';
  document.getElementById('fDelete').style.display='none';
  document.getElementById('liveModal').classList.add('open');
}
function openLiveEdit(year,idx){
  thumbB64='';
  const live=liveData[year][idx];
  document.getElementById('liveModalTitle').textContent='✏️ 実績を編集';
  document.getElementById('fEditYear').value=year;document.getElementById('fEditIdx').value=idx;
  document.getElementById('fDate').value=live.date||'';document.getElementById('fYear').value=year;
  document.getElementById('fRole').value=live.role||'主催';document.getElementById('fTitle').value=live.title||'';
  document.getElementById('fOrganizer').value=live.organizer||'';document.getElementById('fFormat').value=live.format||'';
  document.getElementById('fLink').value=live.link||'';
  document.getElementById('fThumbUrl').value=(live.thumb&&!live.thumb.startsWith('data:'))?live.thumb:'';
  document.getElementById('fUpcoming').value=live.upcoming?'1':'0';
  if(live.thumb){document.getElementById('fThumbPreview').src=live.thumb;document.getElementById('fThumbPreviewWrap').style.display='block';if(live.thumb.startsWith('data:'))thumbB64=live.thumb;}
  else document.getElementById('fThumbPreviewWrap').style.display='none';
  document.getElementById('fDelete').style.display='block';
  document.getElementById('liveModal').classList.add('open');
}
document.getElementById('fabAdd').addEventListener('click',()=>openLiveAdd());
document.getElementById('fThumbFile').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;thumbB64=await fileToB64(file);document.getElementById('fThumbPreview').src=thumbB64;document.getElementById('fThumbPreviewWrap').style.display='block';document.getElementById('fThumbUrl').value='';});
document.getElementById('fThumbClear').addEventListener('click',()=>{thumbB64='';document.getElementById('fThumbFile').value='';document.getElementById('fThumbUrl').value='';document.getElementById('fThumbPreviewWrap').style.display='none';});
document.getElementById('liveModalClose').addEventListener('click',()=>document.getElementById('liveModal').classList.remove('open'));
document.getElementById('liveModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('fSubmit').addEventListener('click',()=>{
  const date=document.getElementById('fDate').value.trim();const year=document.getElementById('fYear').value;const title=document.getElementById('fTitle').value.trim();
  if(!date||!title){alert('日付とライブ名は必須です');return;}
  const thumb=thumbB64||document.getElementById('fThumbUrl').value.trim();
  const live={date,role:document.getElementById('fRole').value,title,organizer:document.getElementById('fOrganizer').value.trim(),format:document.getElementById('fFormat').value.trim(),link:document.getElementById('fLink').value.trim(),thumb,upcoming:document.getElementById('fUpcoming').value==='1'};
  const ey=document.getElementById('fEditYear').value;const ei=parseInt(document.getElementById('fEditIdx').value);
  if(ey&&!isNaN(ei)){
    if(ey===year){liveData[year][ei]=live;}
    else{liveData[ey].splice(ei,1);if(liveData[ey].length===0)delete liveData[ey];if(!liveData[year])liveData[year]=[];liveData[year].unshift(live);}
  }else{if(!liveData[year])liveData[year]=[];liveData[year].unshift(live);}
  saveLives(liveData);renderAll();document.getElementById('liveModal').classList.remove('open');
});
document.getElementById('fDelete').addEventListener('click',()=>{
  const year=document.getElementById('fEditYear').value;const idx=parseInt(document.getElementById('fEditIdx').value);
  if(!year||isNaN(idx))return;
  if(!confirm(`「${liveData[year][idx].title}」を削除しますか？`))return;
  liveData[year].splice(idx,1);if(liveData[year].length===0)delete liveData[year];
  saveLives(liveData);renderAll();document.getElementById('liveModal').classList.remove('open');
});

/* プロフィールモーダル */
let avatarB64='';
document.getElementById('btnProfile').addEventListener('click',()=>{
  avatarB64='';
  document.getElementById('hAvatarPreview').src=profile.avatar;
  document.getElementById('hAvatarUrl').value=profile.avatar.startsWith('data:')?'':profile.avatar;
  document.getElementById('hName').value=profile.name;document.getElementById('hSub').value=profile.sub;
  document.getElementById('hDesc').value=profile.desc;document.getElementById('hRole1').value=profile.role1;
  document.getElementById('hRole2').value=profile.role2;document.getElementById('hRole3').value=profile.role3;
  document.getElementById('hRole4').value=profile.role4;document.getElementById('hContact').value=profile.contact;
  document.getElementById('hBooth').value=profile.booth;document.getElementById('hTwitter').value=profile.twitter;
  document.getElementById('profileModal').classList.add('open');
});
document.getElementById('hAvatarFile').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;avatarB64=await fileToB64(file);document.getElementById('hAvatarPreview').src=avatarB64;document.getElementById('hAvatarUrl').value='';});
document.getElementById('profileModalClose').addEventListener('click',()=>document.getElementById('profileModal').classList.remove('open'));
document.getElementById('profileModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('hSubmit').addEventListener('click',()=>{
  profile.avatar=avatarB64||document.getElementById('hAvatarUrl').value.trim()||profile.avatar;
  profile.name=document.getElementById('hName').value.trim()||profile.name;
  profile.sub=document.getElementById('hSub').value.trim();profile.desc=document.getElementById('hDesc').value;
  profile.role1=document.getElementById('hRole1').value.trim();profile.role2=document.getElementById('hRole2').value.trim();
  profile.role3=document.getElementById('hRole3').value.trim();profile.role4=document.getElementById('hRole4').value.trim();
  profile.contact=document.getElementById('hContact').value.trim();profile.booth=document.getElementById('hBooth').value.trim();profile.twitter=document.getElementById('hTwitter').value.trim();
  saveProfile(profile);renderProfile();document.getElementById('profileModal').classList.remove('open');alert('プロフィールを保存しました！');
});

/* エクスポート */
document.getElementById('btnExport').addEventListener('click',()=>{
  const data={profile,lives:liveData};
  const json=JSON.stringify(data);
  document.getElementById('exportText').value=`const SITE_DATA = ${json};`;
  document.getElementById('exportModal').classList.add('open');
});
document.getElementById('exportModalClose').addEventListener('click',()=>document.getElementById('exportModal').classList.remove('open'));
document.getElementById('exportModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('copyBtn').addEventListener('click',()=>{
  const ta=document.getElementById('exportText');ta.select();ta.setSelectionRange(0,99999);
  try{navigator.clipboard.writeText(ta.value).then(()=>{document.getElementById('copyBtn').textContent='✅ コピーしました！';setTimeout(()=>{document.getElementById('copyBtn').textContent='📋 コピーする';},2000);});}
  catch(e){document.execCommand('copy');document.getElementById('copyBtn').textContent='✅ コピーしました！';setTimeout(()=>{document.getElementById('copyBtn').textContent='📋 コピーする';},2000);}
});

renderProfile();
renderAll();
</script>
</body>
</html>
